<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wardrobe - Dress-Up Game</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      font-family: 'Comfortaa', 'Quicksand', Verdana, "Trebuchet MS", Tahoma, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding-top: 76px;
      overflow: hidden;
    }
    #game-area {
      width: 1300px;
      height: 600px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 20px;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      margin: auto;
    }
    #character-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      width: auto;
      max-width: 320px;
      margin-left: 0;
      margin-top: 94px;
      flex-shrink: 0;
    }
    .character-controls-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    #character {
      position: relative;
      width: 250px;
      height: 350px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 5px;
      background-color: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background-image: radial-gradient(circle, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
      background-size: 10px 10px;
      overflow: hidden;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    #character-base, #fixed-base {
      position: absolute;
      width: 250px;
      height: 350px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -webkit-optimize-contrast;
      object-fit: none;
    }
    #fixed-base {
      z-index: 0;
      pointer-events: none;
    }
    #character-base {
      z-index: 1;
    }
    #character-backgrounds {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    #character-backgrounds img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -webkit-optimize-contrast;
      object-fit: none;
      max-width: 250px;
      max-height: 350px;
    }
    .slot img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: -webkit-optimize-contrast;
      object-fit: none;
      max-width: 250px;
      max-height: 350px;
    }
    .equipped-items-bar {
      width: 56px;
      max-height: 350px;
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 5px;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .equipped-visibility-toggle {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      padding: 2px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .equipped-visibility-toggle:hover { background: #e5e7eb; }
    .equipped-visibility-toggle svg { width: 20px; height: 20px; }
    #equipped-items {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    #character.equipped-items-hidden .slot { visibility: hidden; }
    .equipped-item-container {
      position: relative;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .equipped-item-container .item-visibility-btn {
      position: absolute;
      top: 0;
      right: 0;
      width: 18px;
      height: 18px;
      padding: 0;
      border: none;
      background: rgba(255,255,255,0.9);
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
    }
    .equipped-item-container .item-visibility-btn:hover { background: #fff; }
    .equipped-item-container .item-visibility-btn svg { width: 12px; height: 12px; }
    #equipped-items img {
      max-width: 100%;
      max-height: 100%;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: move;
      object-fit: contain;
    }
    #equipped-items .equipped-item-container.body-slot img { object-fit: cover; object-position: top center; }
    #equipped-items img.selected {
      border: 2px solid #6b7280;
    }
    #equipped-items img.dragging {
      opacity: 0.5;
    }
    #equipped-items .drag-over {
      background: #e5e7eb;
    }
    /* Wardrobe uses same layout as store: store-style panel and item cards */
    #wardrobe {
      flex: 1 1 600px;
      min-width: 600px;
      height: 560px;
      max-height: 560px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #wardrobe h2 { margin: 0 0 10px; text-align: center; flex-shrink: 0; }
    #wardrobe #icon-menu { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap; flex-shrink: 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; }
    #wardrobe #icon-menu::-webkit-scrollbar { height: 6px; }
    .wardrobe-search-wrap { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; flex-shrink: 0; min-height: 36px; cursor: pointer; position: relative; z-index: 5; pointer-events: auto; }
    .wardrobe-search-glass { width: 36px; height: 36px; padding: 0; border: 1px solid #d1d5db; border-radius: 8px; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #4b5563; pointer-events: none; }
    .wardrobe-search-wrap:hover .wardrobe-search-glass { background: rgba(255,255,255,1); border-color: #9ca3af; color: #111; }
    .wardrobe-search-input { width: 0; max-width: 0; padding: 0; margin: 0; border: none; border-radius: 8px; font-size: 14px; opacity: 0; visibility: hidden; transition: width 0.2s ease, max-width 0.2s ease, padding 0.2s ease, opacity 0.2s ease, visibility 0.2s; overflow: hidden; }
    .wardrobe-search-wrap.expanded .wardrobe-search-input { width: 100%; max-width: 220px; padding: 8px 12px; margin: 0; border: 1px solid #d1d5db; opacity: 1; visibility: visible; }
    .wardrobe-search-wrap.expanded .wardrobe-search-glass { border-color: #f9a8d4; background: #fce4ec; color: #be185d; }
    #wardrobe #icon-menu::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .wardrobe-item-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 90px;
      flex-shrink: 0;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background-image: radial-gradient(circle, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
      background-size: 10px 10px;
      cursor: pointer;
    }
    .wardrobe-item-container:hover {
      border-color: #6b7280;
    }
    .wardrobe-item-container img.item {
      width: 70px;
      height: 70px;
      object-fit: contain;
      cursor: pointer;
      border-radius: 5px;
      image-rendering: pixelated;
      border: none;
    }
    .wardrobe-item-container.item-body img.item { object-fit: cover; object-position: top center; }
    #body .wardrobe-item-container img.item,
    #saved-outfits .wardrobe-item-container img.item {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }
    #full-set .wardrobe-item-container {
      width: 120px;
    }
    #full-set .wardrobe-item-container img.item {
      width: 100px;
      height: 140px;
      object-fit: contain;
    }
    .wardrobe-set-preview {
      position: relative;
      width: 100px;
      height: 140px;
      overflow: hidden;
      display: block;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .wardrobe-set-preview .wardrobe-set-preview-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .wardrobe-set-preview .wardrobe-set-preview-bg img,
    .wardrobe-set-preview .wardrobe-set-preview-base,
    .wardrobe-set-preview .wardrobe-set-preview-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 140px;
      transform: translate(-50%, -50%);
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      object-fit: none;
      object-position: center center;
    }
    .wardrobe-set-preview .wardrobe-set-preview-base { z-index: 1; pointer-events: none; }
    .wardrobe-set-preview .wardrobe-set-preview-layers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    .wardrobe-set-preview .wardrobe-set-preview-layer.body-slot { object-fit: cover; object-position: top center; }
    .wardrobe-item-container .heart-icon {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      image-rendering: pixelated;
      z-index: 10;
      pointer-events: auto;
    }
    .wardrobe-item-container .item-info-btn {
      position: absolute;
      top: 2px;
      left: 2px;
      z-index: 10;
    }
    .wardrobe-swatch-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 4px;
      opacity: 0.85;
      transition: opacity 0.15s ease;
    }
    .wardrobe-item-container:hover .wardrobe-swatch-dots { opacity: 1; }
    .wardrobe-swatch-dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid #666;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .wardrobe-swatch-dot:hover { border-color: #ec4899; }
    .wardrobe-swatch-dot.selected { border: 2px solid #ec4899; box-shadow: 0 0 0 1px #fff; }
    .wardrobe-item-container .sell-to-vintage-btn { margin-top: 6px; width: 24px; height: 24px; padding: 0; font-size: 12px; line-height: 1; background: #78716c; color: #fff; border: none; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; }
    .wardrobe-item-container .sell-to-vintage-btn:hover { background: #57534e; }
    .wardrobe-item-container .item[data-dropper-hint] { cursor: crosshair; }
    #icon-menu {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }
    #icon-menu::-webkit-scrollbar { height: 6px; }
    #icon-menu::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .menu-icon {
      width: 50px;
      height: 50px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 5px;
      image-rendering: pixelated;
    }
    .menu-icon:hover {
      border-color: #6b7280;
    }
    .menu-icon.selected {
      border: 2px solid #ec4899;
      box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.3);
    }
    .category {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: flex-start;
    }
    .category.active {
      display: flex;
    }
    .category::-webkit-scrollbar { width: 8px; }
    .category::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .category::-webkit-scrollbar-track { background: #f0f0f0; }
    .category-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .category-nav button {
      box-sizing: border-box;
      padding: 4px 8px;
      width: 64px;
      min-width: 64px;
      max-width: 64px;
      font-size: 12px;
      background: var(--btn-pink-gradient);
      color: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 5px;
      cursor: pointer;
      box-shadow: var(--btn-pink-shadow);
      flex: 0 0 64px;
    }
    .category-nav button:hover:not(:disabled) {
      background: var(--btn-pink-gradient-hover);
      filter: brightness(1.02);
      box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .category-nav button:disabled {
      background: #ccc;
      cursor: not-allowed;
      border: 1px solid #d1d5db;
      box-shadow: none;
    }
    .item {
      cursor: pointer;
      border-radius: 5px;
      image-rendering: pixelated;
    }
    #equipped-items .item,
    #equipped-items img { border: 1px solid #ccc; pointer-events: auto; }
    #equipped-items .item:hover { border-color: #6b7280; }
    #layering-controls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      width: 250px;
      justify-content: center;
    }
    #layering-controls button {
      padding: 5px 10px;
      background: var(--btn-pink-gradient);
      color: #fff;
      border: var(--btn-pink-border);
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 0 0 80px;
      box-shadow: var(--btn-pink-shadow);
    }
    #layering-controls button:hover {
      background: var(--btn-pink-gradient-hover);
      filter: brightness(1.02);
      box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    #layering-controls button img {
      width: 16px;
      height: 16px;
      image-rendering: pixelated;
    }
    #layering-controls a {
      padding: 5px 10px;
      background: var(--btn-pink-gradient);
      color: white;
      border: var(--btn-pink-border);
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 0 0 80px;
    }
    #layering-controls a:hover {
      background: var(--btn-pink-gradient-hover);
      filter: brightness(1.02);
    }
    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      #game-area {
        width: 100%;
        height: auto;
        flex-direction: column;
        padding: 10px;
      }
      #character-area {
        width: 100%;
        max-width: 320px;
        margin-left: 0;
        margin-top: 0;
      }
      #character {
        width: 200px;
        height: 280px;
      }
      #character-base, #fixed-base, .slot img {
        width: 200px;
        height: 280px;
      }
      .equipped-items-bar {
        width: 56px;
        max-height: 200px;
      }
      #wardrobe {
        width: 100%;
      }
      #icon-menu {
        justify-content: center;
      }
      #layering-controls {
        width: 100%;
        justify-content: space-around;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="item-info-tooltip" class="item-info-tooltip" aria-hidden="true"></div>
    <div id="game-area">
    <div id="character-area">
      <div class="equipped-items-bar">
        <button type="button" class="equipped-visibility-toggle" id="equipped-visibility-toggle" aria-label="Hide equipped items" title="Hide equipped items">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <div id="equipped-items"></div>
      </div>
      <div class="character-controls-wrap">
        <div id="character">
          <div id="character-backgrounds"></div>
          <img src="/Uploads/character.png" id="fixed-base" alt="Character Base">
          <img src="/Uploads/character.png" id="character-base" alt="Character Base">
          <div id="body-slot" class="slot"></div>
          <div id="shirt-slot" class="slot"></div>
          <div id="pants-slot" class="slot"></div>
          <div id="skirt-slot" class="slot"></div>
          <div id="dress-slot" class="slot"></div>
          <div id="jacket-slot" class="slot"></div>
          <div id="shoes-slot" class="slot"></div>
          <div id="hat-slot" class="slot"></div>
          <div id="makeup-slot" class="slot"></div>
          <div id="jewelry-slot" class="slot"></div>
          <div id="other-slot" class="slot"></div>
          <div id="hair-slot" class="slot"></div>
          <div id="socks-slot" class="slot"></div>
        </div>
        <div id="layering-controls">
          <button id="move-up" aria-label="Move selected item up in layering"><img src="/Uploads/arrow-circle-up.svg" alt="" onerror="this.style.display='none'">Up</button>
          <button id="move-down" aria-label="Move selected item down in layering"><img src="/Uploads/arrow-circle-down.svg" alt="" onerror="this.style.display='none'">Down</button>
          <button id="remove-item" aria-label="Remove selected item"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2'%3E%3Cpath d='M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z'/%3E%3Cline x1='10' y1='11' x2='10' y2='17'/%3E%3Cline x1='14' y1='11' x2='14' y2='17'/%3E%3C/svg%3E" alt="" width="20" height="20">Remove</button>
          <button type="button" id="toggle-background-btn" aria-label="Toggle background on/off" style="display: none;">Background: On</button>
          <button id="reset-outfit" aria-label="Reset all equipped items">Reset Outfit</button>
          <button type="button" id="save-outfit" aria-label="Save current outfit" onclick="if(typeof window.handleSaveOutfitClick==='function'){window.handleSaveOutfitClick();}else{alert('Please wait for the page to finish loading, then try again.');} return false;">Save Outfit</button>
        </div>
      </div>
    </div>
    <div id="wardrobe">
      <h2>Wardrobe</h2>
      <div id="icon-menu">
        <img src="/Uploads/full-sets-icon.png" class="menu-icon" id="full-sets-icon" alt="Full Sets Menu" role="button" aria-label="Open full sets menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/saved-outfits-icon.png" class="menu-icon" id="saved-outfits-icon" data-categories="saved-outfits" alt="Saved Outfits Menu" role="button" aria-label="Open saved outfits menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/body-icon.png" class="menu-icon" id="body-icon" alt="Body Menu" role="button" aria-label="Open body menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/shirt-icon.png" class="menu-icon" data-categories="shirt" alt="Shirt Menu" role="button" aria-label="Open shirt menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/pants-icon.png" class="menu-icon" data-categories="pants" alt="Pants Menu" role="button" aria-label="Open pants menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/skirt-icon.png" class="menu-icon" data-categories="skirt" alt="Skirt Menu" role="button" aria-label="Open skirt menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/dress-icon.png" class="menu-icon" data-categories="dress" alt="Dress Menu" role="button" aria-label="Open dress menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/jacket-icon.png" class="menu-icon" data-categories="jacket" alt="Jacket Menu" role="button" aria-label="Open jacket menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/shoes-icon.png" class="menu-icon" data-categories="shoes" alt="Shoes Menu" role="button" aria-label="Open shoes menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/socks-icon.png" class="menu-icon" data-categories="socks" alt="Socks Menu" role="button" aria-label="Open socks menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/hat-icon.png" class="menu-icon" data-categories="hat" alt="Hat Menu" role="button" aria-label="Open hat menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/other-icon.png" class="menu-icon" id="other-icon" alt="Other Menu" role="button" aria-label="Open other menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/hair-icon.png" class="menu-icon" data-categories="hair" alt="Hair Menu" role="button" aria-label="Open hair menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">
        <img src="/Uploads/makeup-icon.png" class="menu-icon" data-categories="makeup" alt="Makeup Menu" role="button" aria-label="Open makeup menu" onerror="this.onerror=null;this.src='/img/heart_true.svg'">

    function initWardrobeSearch() {
      const wrap = document.getElementById('wardrobe-search-wrap');
      const input = document.getElementById('wardrobe-search-input');
      if (!wrap || !input) return;
      function expand() {
        wrap.classList.add('expanded');
        input.focus();
      }
      function collapse() {
        if (input === document.activeElement) return;
        wrap.classList.remove('expanded');
      }
      wrap.addEventListener('mouseenter', expand);
      wrap.addEventListener('mouseover', function (e) {
        if (e.relatedTarget && wrap.contains(e.relatedTarget)) return;
        expand();
      });
      wrap.addEventListener('mouseleave', function () { collapse(); });
      wrap.addEventListener('click', function (e) {
        if (e.target === input) return;
        e.preventDefault();
        if (wrap.classList.contains('expanded')) return;
        expand();
      });
      input.addEventListener('input', function () {
        wardrobeSearchQuery = (input.value || '').trim();
        try { if (typeof updateWardrobeDisplay === 'function') updateWardrobeDisplay(); } catch (err) {}
      });
      input.addEventListener('blur', function () {
        setTimeout(function () {
          if (document.activeElement !== input && !wrap.contains(document.activeElement)) wrap.classList.remove('expanded');
        }, 150);
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          wrap.classList.remove('expanded');
          input.value = '';
          wardrobeSearchQuery = '';
          try { if (typeof updateWardrobeDisplay === 'function') updateWardrobeDisplay(); } catch (err) {}
          input.blur();
        }
      });
    }

    async function loadEquippedItems() {

        const controller = new AbortController();
        const timeoutId = setTimeout(function () { controller.abort(); }, 8000);
        const response = await fetch('/api/equipped-items', { credentials: 'same-origin', signal: controller.signal });
        clearTimeout(timeoutId);
        if (!response.ok) {
          slotSet.forEach(slotId => { equippedItems[slotId] = []; });
          updateEquippedItems();
          updateHeartedItemsDebounced();
          updateWardrobeHeartsDebounced();
          return;
        }
        const parsed = await response.json();
        if (!parsed || typeof parsed !== 'object') {
          slotSet.forEach(slotId => { equippedItems[slotId] = []; });
          updateEquippedItems();
          updateHeartedItemsDebounced();
          updateWardrobeHeartsDebounced();
          return;
        }
        slotSet.forEach(slotId => { equippedItems[slotId] = []; });

        Object.keys(equippedItems).forEach(k => { if (!slotSet.has(k)) delete equippedItems[k]; });
        Object.keys(equippedItems).forEach(slotId => {
          if (!slotSet.has(slotId)) return;
          (equippedItems[slotId] || []).forEach(item => {

            if (item.y == null && item.defaultY != null) item.y = Number(item.defaultY);
          });
        });
        slotSet.forEach(slotId => {
          const slot = document.getElementById(slotId);
          if (slot) slot.innerHTML = '';
        });
        Object.keys(equippedItems).forEach(slotId => {
          if (!slotSet.has(slotId)) return;

        updateHeartedItemsDebounced();
        updateWardrobeHeartsDebounced();

    function compositeOutfitToCanvas(canvas, done) {
      const W = 250, H = 350;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.mozImageSmoothingEnabled = false;
      ctx.webkitImageSmoothingEnabled = false;
      ctx.msImageSmoothingEnabled = false;
      const items = getFlatItemsForMerge();
      if (items.length === 0) { ctx.clearRect(0, 0, W, H); done(); return; }
      const loadedImages = new Array(items.length);
      let loadedCount = 0;
      let errorCount = 0;
      function tryDrawAll() {
        if (loadedCount !== items.length) return;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < items.length; i++) {
          const img = loadedImages[i];
          const item = items[i];
          if (!img || !img.complete) continue;
          const nw = img.naturalWidth || W, nh = img.naturalHeight || H;
          /* Integer-scale only for crisp pixels: 1x, 0.5x, 0.33x, etc. */
          let scale = Math.min(1, W / nw, H / nh);
          if (scale < 1) scale = 1 / Math.ceil(1 / scale);
          let drawW = Math.round(nw * scale), drawH = Math.round(nh * scale);
          if (drawW % 2 !== 0) drawW++; if (drawH % 2 !== 0) drawH++;
          const cx = 125 + (item.x || 0), cy = 175 + (item.y || 0);
          ctx.drawImage(img, 0, 0, nw, nh, Math.round(cx - drawW / 2), Math.round(cy - drawH / 2), drawW, drawH);
        }
        if (typeof saveOutfitLog === 'function') saveOutfitLog('compositeOutfitToCanvas done()', { loadedCount: loadedCount, errorCount: errorCount });
        done();
      }
      items.forEach((item, i) => {
        const img = new Image();
        var src = (item.src || '').trim();
        if (src && src.indexOf('/') === 0) src = window.location.origin + src;
        else if (src && src.indexOf('http') === 0) {
          try {
            var u = new URL(src);
            if (u.origin !== window.location.origin) src = window.location.origin + u.pathname + (u.search || '');
          } catch (e) {}
        }
        img.onload = () => { loadedImages[i] = img; loadedCount++; tryDrawAll(); };
        img.onerror = () => { errorCount++; loadedCount++; tryDrawAll(); };
        img.src = src || '';
      });
    }

      try { setDefaultCategory(); } catch (_) {}
    }
    (function setupWardrobeClickDelegation() {
      var panel = document.getElementById('wardrobe');
      if (!panel) return;
      panel.addEventListener('click', function(e) {
        var container = e.target.closest('.wardrobe-item-container');
        if (!container || container.classList.contains('wardrobe-set-card')) return;
        var img = container.querySelector('img.item');
        if (!img) return;
        if (e.target !== img && e.target !== container) return;
        e.preventDefault();
        if (typeof handleItemClick === 'function') handleItemClick(e);
        e.stopPropagation();
      }, true);
    })();
    try { setupFullSetClickDelegation(); } catch (_) {}
    try { setupSaveOutfit(); } catch (_) {}
    try { setupEquippedItemsDrag(); } catch (_) {}
    try { setupIconMenu(); } catch (_) {}
    try { setupMoveUp(); } catch (_) {}
    try { setupMoveDown(); } catch (_) {}
    try { setupToggleBackground(); } catch (_) {}
    try { setupRemoveItem(); } catch (_) {}
    try { setupResetOutfit(); } catch (_) {}
    try { if (typeof initWardrobeSearch === 'function') initWardrobeSearch(); } catch (_) {}

    (async function init() {
      try { await loadEquippedItems(); } catch (_) {}
      try { setDefaultCategory(); } catch (_) {}
      try { await fetchWardrobeItems(); } catch (_) {}
      try { await loadSavedOutfits(); } catch (_) {}
      var loadOutfitName = typeof URLSearchParams !== 'undefined' ? (new URLSearchParams(window.location.search)).get('load') : null;
      if (loadOutfitName && loadOutfitName.trim() && lastLoadedSavedOutfits.length > 0) {
        var toLoad = lastLoadedSavedOutfits.find(function (o) { return o && o.name && String(o.name).trim() === String(loadOutfitName).trim(); });
        if (toLoad && typeof toLoad.items === 'object') {
          try {
            applySavedOutfitToCharacter(toLoad);
            await saveEquippedItems();
            updateEquippedItems();
            updateHeartedItemsDebounced();
            updateWardrobeHeartsDebounced();
            if (typeof showToast === 'function') showToast('Outfit "' + (toLoad.name || '') + '" equipped.');
            if (window.history && window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
          } catch (_) {}
        }
      }
      var hasAnyEquipped = Object.keys(equippedItems).some(function (k) { return Array.isArray(equippedItems[k]) && equippedItems[k].length > 0; });
      if (!hasAnyEquipped && !loadOutfitName && lastLoadedSavedOutfits.length > 0) {
        var lastOutfit = lastLoadedSavedOutfits[lastLoadedSavedOutfits.length - 1];
        if (lastOutfit && typeof lastOutfit.items === 'object') {
          try {
            applySavedOutfitToCharacter(lastOutfit);
            updateEquippedItems();
            await saveEquippedItems();
          } catch (_) {}
        }
      }
      try { if (typeof updateEquippedItems === 'function') updateEquippedItems(); } catch (_) {}
    })();
    // Refetch items when page becomes visible so edits from Adjust/Item Debug appear
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        fetchWardrobeItems();
      }
    });
    // Persist current outfit when leaving the page so it loads next time
    window.addEventListener('pagehide', function () {
      const eq = window.equippedItems;
      if (!eq || typeof eq !== 'object') return;
      const slotSet = window.VALID_SLOT_IDS || new Set(['body-slot','shirt-slot','pants-slot','skirt-slot','dress-slot','jacket-slot','shoes-slot','hat-slot','makeup-slot','jewelry-slot','other-slot','hair-slot','socks-slot']);
      const toSave = {};
      slotSet.forEach(function (slotId) { toSave[slotId] = Array.isArray(eq[slotId]) ? eq[slotId].slice() : []; });
      try {
        fetch('/api/equipped-items', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(toSave), keepalive: true });
      } catch (_) {}
    });
  </script>
  <script src="/js/toast.js" defer></script>
  <script src="/js/api.js" defer></script>
  <script src="/js/header.js" defer></script>
</body>
