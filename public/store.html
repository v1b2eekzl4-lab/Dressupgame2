<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping - Dress-Up Game</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body { font-family: 'Comfortaa', 'Quicksand', Verdana, "Trebuchet MS", Tahoma, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding-top: 76px; overflow: hidden; }
    #game-area { width: 1300px; height: 600px; display: flex; gap: 20px; align-items: flex-start; padding: 20px; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); margin: auto; overflow: hidden; }
    #character-area { display: flex; flex-direction: row; align-items: flex-start; gap: 8px; width: auto; max-width: 320px; flex-shrink: 0; margin-top: 94px; }
    .character-controls-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    #character { position: relative; width: 250px; height: 350px; border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 5px; background-color: rgba(255, 255, 255, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); background-image: radial-gradient(circle, rgba(0, 0, 0, 0.06) 1px, transparent 1px); background-size: 10px 10px; overflow: hidden; transform: translateZ(0); backface-visibility: hidden; }
    #fixed-base, #character-base { position: absolute; width: 250px; height: 350px; top: 50%; left: 50%; transform: translate(-50%, -50%); image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; object-fit: none; }
    #fixed-base { z-index: 0; pointer-events: none; }
    #character-base { z-index: 1; pointer-events: none; }
    #character-backgrounds { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #character-backgrounds img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; object-fit: none; max-width: 250px; max-height: 350px; }
    .slot img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; object-fit: none; max-width: 250px; max-height: 350px; }
    #store-layering-controls { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; width: 250px; justify-content: center; }
    #store-layering-controls button { padding: 5px 10px; background: var(--btn-pink-gradient); color: #fff; border: var(--btn-pink-border); border-radius: 5px; cursor: pointer; font-size: 12px; box-shadow: var(--btn-pink-shadow); }
    #store-layering-controls button:hover { background: var(--btn-pink-gradient-hover); filter: brightness(1.02); box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6); }
    .equipped-items-bar { width: 56px; max-height: 350px; padding: 8px; border: 2px solid #ccc; border-radius: 5px; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; gap: 5px; overflow: hidden; flex-shrink: 0; }
    .equipped-visibility-toggle { flex-shrink: 0; width: 28px; height: 28px; padding: 2px; border: none; background: transparent; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .equipped-visibility-toggle:hover { background: #e5e7eb; }
    .equipped-visibility-toggle svg { width: 20px; height: 20px; }
    #store-equipped-items { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    #character.equipped-items-hidden .slot { visibility: hidden; }
    #store-equipped-items .equipped-item-container { position: relative; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: grab; }
    #store-equipped-items .equipped-item-container .item-visibility-btn { position: absolute; top: 0; right: 0; width: 18px; height: 18px; padding: 0; border: none; background: rgba(255,255,255,0.9); border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 0 0 1px rgba(0,0,0,0.2); }
    #store-equipped-items .equipped-item-container .item-visibility-btn:hover { background: #fff; }
    #store-equipped-items .equipped-item-container .item-visibility-btn svg { width: 12px; height: 12px; }
    #store-equipped-items .equipped-item-container:active { cursor: grabbing; }
    #store-equipped-items .equipped-item-container.store-drag-over { opacity: 0.7; }
    #store-equipped-items .equipped-item-container.store-drop-target { border: 2px dashed #16a34a; border-radius: 6px; }
    #store-equipped-items img { max-width: 100%; max-height: 100%; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; object-fit: contain; pointer-events: none; }
    #store-equipped-items .equipped-item-container.body-slot img { object-fit: cover; object-position: top center; }
    #store-equipped-items img.selected { border: 2px solid #6b7280; }
    #store-panel { flex: 1 1 600px; min-width: 600px; height: 560px; max-height: 560px; display: flex; flex-direction: column; overflow: hidden; }
    #store-panel h2 { margin: 0 0 10px; text-align: center; flex-shrink: 0; }
    #store-panel #icon-menu { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap; flex-shrink: 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; }
    #store-panel #icon-menu::-webkit-scrollbar { height: 6px; }
    #store-panel #icon-menu::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .menu-icon { width: 50px; height: 50px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; image-rendering: pixelated; }
    .menu-icon:hover { border-color: #6b7280; }
    .menu-icon.selected { border: 2px solid #ec4899; box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.3); }
    .category { display: none; flex-wrap: wrap; gap: 10px; flex: 1 1 0; min-height: 0; overflow-y: auto; overflow-x: hidden; align-content: flex-start; }
    .category.active { display: flex; }
    .category::-webkit-scrollbar { width: 8px; }
    .category::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .category::-webkit-scrollbar-track { background: #f0f0f0; }
    .category-nav { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
    .category-nav button { padding: 5px 10px; background: var(--btn-pink-gradient); color: #fff; border: var(--btn-pink-border); border-radius: 5px; cursor: pointer; box-shadow: var(--btn-pink-shadow); }
    .category-nav button:hover:not(:disabled) { background: var(--btn-pink-gradient-hover); filter: brightness(1.02); box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6); }
    .category-nav button:disabled { background: #ccc; cursor: not-allowed; border: 1px solid #d1d5db; box-shadow: none; }
    .store-item-container { position: relative; display: flex; flex-direction: column; align-items: center; width: 90px; flex-shrink: 0; padding: 4px; border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 8px; background-color: rgba(255, 255, 255, 0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); background-image: radial-gradient(circle, rgba(0, 0, 0, 0.06) 1px, transparent 1px); background-size: 10px 10px; cursor: pointer; }
    .store-heart-icon { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; cursor: pointer; image-rendering: pixelated; z-index: 10; }
    .store-star-icon { position: absolute; top: 2px; left: 26px; width: 18px; height: 18px; cursor: pointer; z-index: 10; }
    .store-item-container .item-info-btn { position: absolute; top: 2px; left: 2px; z-index: 10; }
    .store-item-container:hover { border-color: #6b7280; }
    .store-item-container img.item { width: 70px; height: 70px; object-fit: contain; border-radius: 5px; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; image-rendering: pixelated; image-rendering: -webkit-optimize-contrast; pointer-events: none; }
    .store-item-container.item-body img.item { object-fit: cover; object-position: top center; }
    .store-item-price { font-size: 12px; font-weight: 600; color: #374151; margin: 4px 0; }
    .store-item-container .btn-buy { padding: 4px 10px; background: var(--btn-pink-gradient); color: #fff; border: var(--btn-pink-border); border-radius: 5px; cursor: pointer; font-size: 11px; box-shadow: var(--btn-pink-shadow); }
    .store-item-container .btn-buy:hover:not(:disabled) { background: var(--btn-pink-gradient-hover); filter: brightness(1.02); box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6); }
    .store-item-container .btn-buy:disabled { background: #9ca3af; cursor: not-allowed; border: 1px solid #d1d5db; box-shadow: none; }
    .store-item-container .owned { font-size: 11px; color: #059669; font-weight: 600; }
    #store-message { text-align: center; padding: 8px; margin-bottom: 8px; border-radius: 6px; display: none; }
    #store-message.success { background: #d1fae5; color: #065f46; display: block; }
    #store-message.error { background: #fee2e2; color: #991b1b; display: block; }
    .checkout-btn { padding: 8px 16px; background: var(--btn-pink-gradient); color: #fff; border: var(--btn-pink-border); border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 8px; box-shadow: var(--btn-pink-shadow); }
    .checkout-btn:hover:not(:disabled) { background: var(--btn-pink-gradient-hover); filter: brightness(1.02); box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6); }
    .checkout-btn:disabled { background: #9ca3af; cursor: not-allowed; border: 1px solid #d1d5db; box-shadow: none; }
    #checkout-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    #checkout-modal.open { display: flex; }
    .checkout-modal-inner { background: white; border-radius: 12px; max-width: 420px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .checkout-modal-inner h2 { margin: 0; padding: 16px; border-bottom: 1px solid #e5e7eb; font-size: 1.25rem; }
    .checkout-list { padding: 12px; overflow-y: auto; flex: 1; }
    .checkout-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
    .checkout-row:last-child { border-bottom: none; }
    .checkout-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .checkout-row img { width: 48px; height: 48px; object-fit: contain; image-rendering: pixelated; border-radius: 6px; border: 1px solid #e5e7eb; }
    .checkout-row .name { flex: 1; font-size: 14px; }
    .checkout-row .price { font-weight: 600; color: #374151; }
    .checkout-total { padding: 12px 16px; border-top: 2px solid #e5e7eb; font-weight: 700; font-size: 1.1rem; display: flex; justify-content: space-between; }
    .checkout-actions { padding: 12px 16px; display: flex; gap: 10px; justify-content: flex-end; }
    .checkout-actions button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .checkout-actions .btn-cancel { background: #f3f4f6; border: 1px solid #d1d5db; }
    .checkout-actions .btn-purchase { background: var(--btn-pink-gradient); color: #fff; border: var(--btn-pink-border); box-shadow: var(--btn-pink-shadow); }
    .checkout-actions .btn-purchase:hover:not(:disabled) { background: var(--btn-pink-gradient-hover); filter: brightness(1.02); box-shadow: 0 3px 8px rgba(244,143,177,0.45), inset 0 1px 0 rgba(255,255,255,0.6); }
    .checkout-actions .btn-purchase:disabled { background: #9ca3af; cursor: not-allowed; border: 1px solid #d1d5db; box-shadow: none; }
    .checkout-empty { padding: 24px; text-align: center; color: #6b7280; }
    .store-loading, .store-empty { padding: 24px; text-align: center; color: #6b7280; font-size: 14px; }
    .store-loading { font-style: italic; }
    .store-swatch-dots { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 4px; opacity: 0.85; transition: opacity 0.15s ease; }
    .store-item-container:hover .store-swatch-dots { opacity: 1; }
    .store-swatch-dot { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #666; cursor: pointer; flex-shrink: 0; transition: border-color 0.15s, box-shadow 0.15s; }
.store-swatch-dot:hover { border-color: #ec4899; }
.store-swatch-dot.selected { border: 2px solid #ec4899; box-shadow: 0 0 0 1px #fff; }
    #store-debug-btn.active { background: #dc2626; border-color: #b91c1c; }
    .store-debug-mode .store-item-container:not(.store-set-card) { width: 110px; min-width: 110px; }
    .store-debug-panel { margin-top: 6px; padding: 6px; background: rgba(0,0,0,0.08); border-radius: 6px; font-size: 10px; display: flex; flex-direction: column; gap: 4px; }
    .store-debug-panel select { font-size: 10px; padding: 2px 4px; width: 100%; max-width: 80px; }
    .store-debug-panel .store-debug-coords { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .store-debug-panel .store-debug-coords input { width: 36px; font-size: 10px; padding: 2px 4px; }
    .store-debug-panel .store-debug-save { padding: 2px 8px; font-size: 10px; background: #16a34a; color: #fff; border: 1px solid #15803d; border-radius: 4px; cursor: pointer; align-self: flex-start; }
    .store-debug-panel .store-debug-save:hover { background: #15803d; }
    .store-set-preview {
      position: relative;
      width: 100px;
      height: 140px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
    }
    .store-set-preview .store-set-preview-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .store-set-preview .store-set-preview-bg img,
    .store-set-preview .store-set-preview-base,
    .store-set-preview .store-set-preview-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 140px;
      transform: translate(-50%, -50%);
      image-rendering: pixelated;
      object-fit: none;
      object-position: center center;
    }
    .store-set-preview .store-set-preview-base { z-index: 1; pointer-events: none; }
    .store-set-preview .store-set-preview-layers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    .store-set-preview .store-set-preview-layer.body-slot { object-fit: cover; object-position: top center; }
    .store-search-wrap { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; flex-shrink: 0; min-height: 36px; cursor: pointer; position: relative; }
    .store-search-glass { width: 36px; height: 36px; padding: 0; border: 1px solid #d1d5db; border-radius: 8px; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #4b5563; pointer-events: none; }
    .store-search-wrap:hover .store-search-glass { background: rgba(255,255,255,1); border-color: #9ca3af; color: #111; }
    .store-search-input { width: 0; max-width: 0; padding: 0; margin: 0; border: none; border-radius: 8px; font-size: 14px; opacity: 0; visibility: hidden; transition: width 0.2s ease, max-width 0.2s ease, padding 0.2s ease, opacity 0.2s ease, visibility 0.2s; overflow: hidden; }
    .store-search-wrap.expanded .store-search-input { width: 100%; max-width: 220px; padding: 8px 12px; margin: 0; border: 1px solid #d1d5db; opacity: 1; visibility: visible; }
    .store-search-wrap.expanded .store-search-glass { border-color: #f9a8d4; background: #fce4ec; color: #be185d; }
    #full-set .store-item-container {
      width: 90px;
      min-width: 90px;
    }
    #full-set .store-item-container.store-set-card {
      width: 100px;
      min-width: 100px;
    }
    #full-set .store-set-card img.item {
      width: 100px;
      height: 140px;
      object-fit: contain;
      object-position: center center;
    }
    </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="item-info-tooltip" class="item-info-tooltip" aria-hidden="true"></div>
  <div id="game-area">
    <div id="character-area">
      <div class="equipped-items-bar">
        <button type="button" class="equipped-visibility-toggle" id="store-equipped-visibility-toggle" aria-label="Hide equipped items" title="Hide equipped items">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <div id="store-equipped-items"></div>
      </div>
      <div class="character-controls-wrap">
        <div id="character">
          <div id="character-backgrounds"></div>
          <img src="/Uploads/character.png" id="fixed-base" alt="Character Base">
          <img src="/Uploads/character.png" id="character-base" alt="Character Base">
          <div id="body-slot" class="slot"></div>
          <div id="shirt-slot" class="slot"></div>
          <div id="pants-slot" class="slot"></div>
          <div id="skirt-slot" class="slot"></div>
          <div id="dress-slot" class="slot"></div>
          <div id="jacket-slot" class="slot"></div>
          <div id="shoes-slot" class="slot"></div>
          <div id="hat-slot" class="slot"></div>
          <div id="makeup-slot" class="slot"></div>
          <div id="jewelry-slot" class="slot"></div>
          <div id="other-slot" class="slot"></div>
          <div id="hair-slot" class="slot"></div>
          <div id="socks-slot" class="slot"></div>
        </div>
        <div id="store-layering-controls">
          <button type="button" id="store-move-up">Up</button>
          <button type="button" id="store-move-down">Down</button>
          <button type="button" id="store-remove-item">Remove</button>
          <button type="button" id="store-toggle-background-btn" style="display: none;">Background: On</button>
          <button type="button" id="store-reset-outfit">Reset</button>
        </div>
        <button type="button" id="store-checkout-btn" class="checkout-btn">Check out</button>
      </div>
    </div>
    <div id="store-panel">
      <h2>Shopping</h2>
      <div id="store-server-hint" style="display:none;margin-bottom:8px;padding:8px;background:#fef3c7;border-radius:6px;font-size:12px;color:#92400e;">
        Open this page from the server so the catalog loads: <strong>http://localhost:3000/store.html</strong>
      </div>
      <div id="store-message"></div>
      <div id="icon-menu">
        <img src="/Uploads/body-icon.png" class="menu-icon" id="body-icon" alt="Body" role="button">
        <img src="/Uploads/shirt-icon.png" class="menu-icon" data-categories="shirt" alt="Shirt" role="button">
        <img src="/Uploads/pants-icon.png" class="menu-icon" data-categories="pants" alt="Pants" role="button">
        <img src="/Uploads/skirt-icon.png" class="menu-icon" data-categories="skirt" alt="Skirt" role="button">
        <img src="/Uploads/dress-icon.png" class="menu-icon" data-categories="dress" alt="Dress" role="button">
        <img src="/Uploads/jacket-icon.png" class="menu-icon" data-categories="jacket" alt="Jacket" role="button">
        <img src="/Uploads/shoes-icon.png" class="menu-icon" data-categories="shoes" alt="Shoes" role="button">
        <img src="/Uploads/socks-icon.png" class="menu-icon" data-categories="socks" alt="Socks" role="button">
        <img src="/Uploads/hat-icon.png" class="menu-icon" data-categories="hat" alt="Hat" role="button">
        <img src="/Uploads/other-icon.png" class="menu-icon" id="other-icon" alt="Other" role="button">
        <img src="/Uploads/hair-icon.png" class="menu-icon" data-categories="hair" alt="Hair" role="button">
        <img src="/Uploads/makeup-icon.png" class="menu-icon" data-categories="makeup" alt="Makeup" role="button">
        <img src="/Uploads/full-sets-icon.png" class="menu-icon" id="full-sets-icon" alt="Full Sets" role="button">
        <img src="/Uploads/heart-icon.png" class="menu-icon" id="store-heart-icon" data-categories="favorites" alt="Favorites" role="button" aria-label="Favorites">
      </div>
      <div id="store-search-wrap" class="store-search-wrap" title="Hover to search by name or tags">
        <span class="store-search-glass" aria-hidden="true">
          <svg class="store-search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="text" id="store-search-input" class="store-search-input" placeholder="Search by name or tags…" aria-label="Search store by name or tags" autocomplete="off">
      </div>
      <div id="store-debug-bar" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0;">
        <button type="button" id="store-debug-btn" style="padding:4px 10px;background:#6b7280;color:#fff;border:1px solid #4b5563;border-radius:5px;cursor:pointer;font-size:12px;">Debug</button>
      </div>
      <div id="all" class="category"></div>
      <div id="body" class="category"></div>
      <div id="shirt" class="category"></div>
      <div id="pants" class="category"></div>
      <div id="skirt" class="category"></div>
      <div id="dress" class="category"></div>
      <div id="jacket" class="category"></div>
      <div id="shoes" class="category"></div>
      <div id="socks" class="category"></div>
      <div id="hat" class="category"></div>
      <div id="jewelry" class="category"></div>
      <div id="other" class="category"></div>
      <div id="hair" class="category"></div>
      <div id="makeup" class="category"></div>
      <div id="full-set" class="category"></div>
      <div id="favorites" class="category"></div>
    </div>
  </div>

  <!-- Checkout modal -->
  <div id="checkout-modal">
    <div class="checkout-modal-inner">
      <h2>Check out</h2>
      <div id="checkout-list" class="checkout-list"></div>
      <div id="checkout-total" class="checkout-total" style="display: none;"></div>
      <div id="checkout-actions" class="checkout-actions" style="display: none;">
        <button type="button" class="btn-cancel" id="checkout-cancel">Cancel</button>
        <button type="button" class="btn-purchase" id="checkout-purchase">Purchase selected</button>
      </div>
    </div>
  </div>

  <script src="/js/slots.js" defer></script>
  <script>

        function rgbToHex(r, g, b) {
          return '#' + [r, g, b].map(x => { const h = Math.max(0, Math.min(255, Math.round(x))).toString(16); return h.length === 1 ? '0' + h : h; }).join('');
        }
        function getColorAt(clientX, clientY) {
          const rect = small.getBoundingClientRect();
          const scaleX = img.naturalWidth / rect.width, scaleY = img.naturalHeight / rect.height;
          const x = Math.floor((clientX - rect.left) * scaleX);
          const y = Math.floor((clientY - rect.top) * scaleY);
          if (x < 0 || x >= w || y < 0 || y >= h) return null;
          const data = ctx.getImageData(x, y, 1, 1).data;
          return rgbToHex(data[0], data[1], data[2]);
        }
        function done(hex) {
          document.body.removeChild(overlay);
          small.removeEventListener('click', onImgClick);
          overlay.removeEventListener('click', onOverlayClick);
          if (hex && onPicked) onPicked(hex);
        }
        function onImgClick(e) {
          e.preventDefault();
          e.stopPropagation();
          const hex = getColorAt(e.clientX, e.clientY);
          if (hex) done(hex);
        }
        function onOverlayClick(e) {
          if (e.target === overlay) done(null);
        }
        small.addEventListener('click', onImgClick);
        overlay.addEventListener('click', onOverlayClick);
      };
      img.onerror = () => { if (onPicked) onPicked(null); };
      img.src = imgSrc;
    }

    function setStoreLoading(loading) {
      const allDiv = document.getElementById('all');
      if (!allDiv) return;
      if (loading) {
        allDiv.innerHTML = '<div class="store-loading">Loading store…</div>';
      }
    }

    async function loadStoreItems() {
      setStoreLoading(true);
      try {
        const r = await fetch('/api/items', { credentials: 'same-origin' });
        if (typeof handleApiResponse === 'function') await handleApiResponse(r);
        else if (!r.ok) throw new Error('Failed to load store (status ' + r.status + ')');
        const data = await r.json();
        storeItems = Array.isArray(data) ? data : (data && Array.isArray(data.items) ? data.items : []);
        if (storeItems.length && storeItems[0] && Array.isArray(storeItems[0])) storeItems = storeItems.flat();
        if (!Array.isArray(storeItems)) storeItems = [];
        categories.forEach(c => { currentPages[c] = 1; });
        updateStoreDisplay();
      } catch (e) {
        setStoreLoading(false);
        showStoreMsg('Could not load store: ' + (e.message || 'error').replace(/Failed to load store \(status 404\)/, 'Store API not found. Are you opening this page via the server (e.g. http://localhost:3000/store.html)?'), true);
        const hint = document.getElementById('store-server-hint');
        if (hint) hint.style.display = 'block';
        const allEl = document.getElementById('all');
        if (allEl) allEl.innerHTML = '<div class="store-empty">Could not load items. Open this page from the server (e.g. <strong>http://localhost:' + (window.location.port || '3000') + '/store.html</strong>) and ensure the server is running.</div>';
      }
    }

    function getRootFilename(storeItem) {
      return (storeItem && (getSwatchParentFilename(storeItem) || storeItem.filename)) || '';
    }
    async function buyItem(item, price) {
      try {
        const r = await fetch('/api/purchase/' + encodeURIComponent(item.filename), { method: 'POST', credentials: 'same-origin' });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          showStoreMsg(data.error || 'Purchase failed', true);
          return;
        }
        currency = data.currency ?? currency - price;
        currency2 = data.currency2 ?? currency2;
        currency3 = data.currency3 ?? currency3;
        purchased = data.purchased || [...purchased, item.filename];
        const rootFilename = getRootFilename(item);
        const otherOwnedSameRoot = rootFilename && purchased.some(function (f) {
          if (f === item.filename) return false;
          const si = storeItems.find(function (i) { return i.filename === f; });
          return si && getRootFilename(si) === rootFilename;
        });
        if (otherOwnedSameRoot && item.filename !== rootFilename) {
          const tags = Array.isArray(item.tags) ? [...item.tags] : [];
          const hasParent = tags.some(function (t) { return typeof t === 'string' && t.startsWith('swatch-parent:') && t.replace('swatch-parent:', '').trim() === rootFilename; });
          if (!hasParent) {
            const withoutParent = tags.filter(function (t) { return typeof t !== 'string' || !t.startsWith('swatch-parent:'); });
            const newTags = withoutParent.concat('swatch-parent:' + rootFilename);
            try {
              await fetch('/api/items/update/' + encodeURIComponent(item.filename), {
                method: 'PUT',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...item, tags: newTags })
              });
            } catch (err) {
              if (typeof showToast === 'function') showToast('Purchased; could not link as swatch', true);
            }
          }
        }
        showStoreMsg('Purchased: ' + (item.name || item.filename));
        updateStoreDisplay();
      } catch (e) {
        showStoreMsg('Error: ' + (e.message || 'purchase failed'), true);
      }

    function renderStoreBackgrounds() {

      withBg.sort((a, b) => (a.background.defaultZ != null ? a.background.defaultZ : 0) - (b.background.defaultZ != null ? b.background.defaultZ : 0));
      withBg.forEach(item => {

    function getRawStoreItems() {
      const out = [];
      const slotOrder = Object.keys(SLOT_LAYER_ORDER).sort((a, b) => (SLOT_LAYER_ORDER[a] ?? 0) - (SLOT_LAYER_ORDER[b] ?? 0));
      slotOrder.forEach(slotId => {
        if (!VALID_SLOT_IDS.has(slotId) || !storePreviewItems[slotId]) return;
        (storePreviewItems[slotId] || []).forEach((item, idx) => out.push({ ...item, slotId, index: idx }));
      });
      return out;
    }
    function getAllStoreItems() {
      const out = getRawStoreItems();
      if (out.length === 0) return out;
      const orderIdx = (item) => equippedOrder.indexOf(item.id);
      if (equippedOrder.length === 0) {
        const byHierarchy = (a, b) => {
          const layerA = SLOT_LAYER_ORDER[a.slotId] ?? 0;
          const layerB = SLOT_LAYER_ORDER[b.slotId] ?? 0;
          if (layerA !== layerB) return layerA - layerB;
          return (a.index ?? 0) - (b.index ?? 0);
        };
        out.sort(byHierarchy);
        equippedOrder = out.slice().reverse().map(o => o.id);
      }
      if (userHasReordered) {
        out.sort((a, b) => {
          const i = orderIdx(a);
          const j = orderIdx(b);
          if (i === -1 && j === -1) return 0;
          if (i === -1) return 1;
          if (j === -1) return -1;
          return i - j;
        });
        return out;
      }
      const bodyItems = out.filter(o => o.slotId === 'body-slot').sort((a, b) => a.index - b.index);
      const nonBody = out.filter(o => o.slotId !== 'body-slot').sort((a, b) => {
        const layerA = SLOT_LAYER_ORDER[a.slotId] ?? 0;
        const layerB = SLOT_LAYER_ORDER[b.slotId] ?? 0;
        if (layerA !== layerB) return layerA - layerB;
        return a.index - b.index;
      });
      const mostRecentNonBody = nonBody.length ? nonBody.reduce((best, o) => orderIdx(o) > orderIdx(best) ? o : best, nonBody[0]) : null;
      const nonBodyWithoutRecent = mostRecentNonBody ? nonBody.filter(o => o.id !== mostRecentNonBody.id) : nonBody;
      const bottomToTop = bodyItems.concat(nonBodyWithoutRecent).concat(mostRecentNonBody ? [mostRecentNonBody] : []);
      const ordered = bottomToTop.slice().reverse();
      ordered.forEach((item, idx) => { item._hierarchyPosition = idx; });
      return ordered;
    }

    function applyZOrderFromStrip() {
      const all = getAllStoreItems();
      all.forEach((item, idx) => {
        const z = all.length - idx + 2;
        item.zIndex = z;
        const actual = (storePreviewItems[item.slotId] || []).find(i => i.id === item.id);
        if (actual) actual.zIndex = z;
      });
    }

    /** Unique store items currently equipped (for checkout). Each item appears once with price. */
    function getEquippedStoreItemsForCheckout() {
      const equipped = getAllStoreItems();
      const seen = new Set();
      const result = [];
      equipped.forEach(equippedEntry => {
        const filename = (equippedEntry.src || '').replace(/^\/Uploads\//, '');
        if (!filename) return;
        const storeItem = storeItems.find(i =>
          i.filename === filename || (i.bundleParts && Array.isArray(i.bundleParts) && i.bundleParts.some(p => p && p.filename === filename))
        );
        if (!storeItem || seen.has(storeItem.filename)) return;
        seen.add(storeItem.filename);
        result.push({ item: storeItem, price: getItemPrice(storeItem) });
      });
      return result;
    }

    async function purchaseCheckoutSelected() {
      const listEl = document.getElementById('checkout-list');
      const checkboxes = listEl.querySelectorAll('input[type="checkbox"]:not(:disabled):checked');
      const itemsToBuy = [];
      checkboxes.forEach(cb => {
        const filename = cb.dataset.filename;
        const price = Number(cb.dataset.price || 0);
        const item = storeItems.find(i => i.filename === filename);
        if (item && price) itemsToBuy.push({ item, price });
      });
      if (itemsToBuy.length === 0) return;
      const purchaseBtn = document.getElementById('checkout-purchase');
      purchaseBtn.disabled = true;
      try {

      } finally {

      }

    function findStoreItemById(itemId) {
      for (const slotId of Object.keys(storePreviewItems)) {
        const idx = (storePreviewItems[slotId] || []).findIndex(i => i.id === itemId);
        if (idx >= 0) return { slotId, index: idx };
      }
      return { slotId: null, index: -1 };
    }
    function tryOnItem(item) {
      const isCombo = item.bundleParts && Array.isArray(item.bundleParts) && item.bundleParts.length > 0;
      if (isCombo) {
        const bundleSrcs = item.bundleParts.map(p => '/Uploads/' + p.filename);
        let anyOn = false;
        const toRemove = [];
        Object.keys(storePreviewItems).forEach(slotId => {
          (storePreviewItems[slotId] || []).forEach(prev => {
            if (bundleSrcs.indexOf(prev.src) !== -1) {
              anyOn = true;
              toRemove.push({ slotId, id: prev.id });
            }
          });
        });
        if (anyOn) {
          toRemove.forEach(({ slotId, id }) => {
            storePreviewItems[slotId] = (storePreviewItems[slotId] || []).filter(i => i.id !== id);
            equippedOrder = equippedOrder.filter(oid => oid !== id);
            const slotEl = document.getElementById(slotId);
            if (slotEl) {
              const img = slotEl.querySelector('[data-item-id="' + id + '"]');
              if (img) img.remove();
            }
          });
          renderStoreBackgrounds();
        } else {
          const allItems = getAllStoreItems();
          let zOffset = allItems.length + 2;
          item.bundleParts.forEach((part, idx) => {
            const slotId = part.slotId;
            if (!VALID_SLOT_IDS.has(slotId)) return;
            if (!storePreviewItems[slotId]) storePreviewItems[slotId] = [];
            const itemId = slotId + '-' + storePreviewItems[slotId].length;
            const x = (part.defaultX != null) ? part.defaultX : 0;
            const y = (part.defaultY != null) ? part.defaultY : 0;
            const z = (part.defaultZ != null) ? part.defaultZ : zOffset++;
            const newItem = { id: itemId, slotId, src: '/Uploads/' + part.filename, alt: (item.name || '') + (idx === 0 ? ' (1)' : ' (2)'), zIndex: z, x, y };
            storePreviewItems[slotId].push(newItem);
            equippedOrder.push(newItem.id);
            const slotEl = document.getElementById(slotId);
            if (slotEl) {
              const img = document.createElement('img');
              img.src = newItem.src;
              img.alt = newItem.alt;
              img.onerror = () => { img.style.display = 'none'; };
              img.dataset.itemId = newItem.id;
              img.dataset.slotId = slotId;
              img.style.zIndex = newItem.zIndex;
              img.style.transform = 'translate(-50%, -50%) translate(' + newItem.x + 'px, ' + newItem.y + 'px)';
              img.addEventListener('click', (e) => { e.stopPropagation(); selectStoreItem(newItem.id); });
              hookPixelPerfect(img);
              slotEl.appendChild(img);
            }
          });
          renderStoreBackgrounds();
        }
      } else {
        const slotId = item.slotId;
        if (!VALID_SLOT_IDS.has(slotId)) return;
        if (!storePreviewItems[slotId]) storePreviewItems[slotId] = [];
        const existing = storePreviewItems[slotId].find(i => i.src === '/Uploads/' + item.filename);
        if (existing) {
          storePreviewItems[slotId] = storePreviewItems[slotId].filter(i => i.id !== existing.id);
          equippedOrder = equippedOrder.filter(oid => oid !== existing.id);
          const slotEl = document.getElementById(slotId);
          if (slotEl) {
            const img = slotEl.querySelector('[data-item-id="' + existing.id + '"]');
            if (img) img.remove();
          }
          renderStoreBackgrounds();
        } else {
          const allItems = getAllStoreItems();
          const coordItem = getCoordItem(item, allItems);
          const itemId = slotId + '-' + storePreviewItems[slotId].length;
          const x = (coordItem.defaultX != null) ? coordItem.defaultX : 0;
          const y = (coordItem.defaultY != null) ? coordItem.defaultY : 0;
          const z = (coordItem.defaultZ != null) ? coordItem.defaultZ : (allItems.length + 2);
          const newItem = { id: itemId, slotId, src: '/Uploads/' + item.filename, alt: item.name || item.filename, zIndex: z, x, y };
          if (item.background) {
            newItem.background = {
              filename: item.background.filename,
              defaultX: item.background.defaultX != null ? item.background.defaultX : 0,
              defaultY: item.background.defaultY != null ? item.background.defaultY : 0,
              defaultZ: item.background.defaultZ != null ? item.background.defaultZ : 0,
              src: '/Uploads/' + (item.background.filename || '')
            };
            newItem.backgroundOn = true;
          }
          storePreviewItems[slotId].push(newItem);
          equippedOrder.push(newItem.id);
          const slotEl = document.getElementById(slotId);
          if (slotEl) {
            const img = document.createElement('img');
            img.src = newItem.src;
            img.alt = newItem.alt;
            img.onerror = () => { img.style.display = 'none'; };
            img.dataset.itemId = newItem.id;
            img.dataset.slotId = slotId;
            img.style.zIndex = newItem.zIndex;
            img.style.transform = 'translate(-50%, -50%) translate(' + newItem.x + 'px, ' + newItem.y + 'px)';
            img.addEventListener('click', (e) => { e.stopPropagation(); selectStoreItem(newItem.id); });
            hookPixelPerfect(img);
            slotEl.appendChild(img);
          }
        }
      }
      renderStoreBackgrounds();
      updateStoreEquippedStrip();
    }
    function selectStoreItem(itemId) {

    function updateStoreEquippedStrip() {

      box.innerHTML = '';
      const all = getAllStoreItems();
      all.forEach((item, idx) => {

        container.addEventListener('dragstart', (e) => {

          container.classList.add('store-drop-target');

          container.classList.remove('store-drag-over');
          const draggedId = e.dataTransfer.getData('text/plain');
          if (!draggedId || draggedId === item.id) return;
          const fromIdx = equippedOrder.indexOf(draggedId);
          const toIdx = equippedOrder.indexOf(item.id);
          if (fromIdx === -1 || toIdx === -1) return;
          userHasReordered = true;

        img.alt = item.alt;

        img.dataset.slotId = item.slotId;

            : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

          visibilityBtn.setAttribute('aria-label', 'Show equipped items');
          visibilityBtn.title = 'Show equipped items';
          visibilityBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
          characterEl.classList.add('equipped-items-hidden');
        }
      }
      visibilityBtn.addEventListener('click', function () {
        storeEquippedItemsVisible = !storeEquippedItemsVisible;
        updateStoreVisibilityButton();
      });
      updateStoreVisibilityButton();
    })();

    document.getElementById('store-checkout-btn').addEventListener('click', openCheckout);
    document.getElementById('checkout-cancel').addEventListener('click', closeCheckout);
    document.getElementById('checkout-purchase').addEventListener('click', purchaseCheckoutSelected);
    document.getElementById('checkout-modal').addEventListener('click', (e) => {
      if (e.target.id === 'checkout-modal') closeCheckout();
    });

    const storePanel = document.getElementById('store-panel');
    if (storePanel) {
      storePanel.addEventListener('wheel', function(e) {
        const cat = e.target.closest('.category.active');
        if (cat && cat.scrollHeight > cat.clientHeight) {
          cat.scrollTop += e.deltaY;
          e.preventDefault();
        }
      }, { passive: false });
    }

    function initStoreSearch() {
      const wrap = document.getElementById('store-search-wrap');
      const input = document.getElementById('store-search-input');
      if (!wrap || !input) return;
      function expand() {
        wrap.classList.add('expanded');
        input.focus();
      }
      wrap.addEventListener('mouseenter', expand);
      wrap.addEventListener('mouseleave', function() {
        if (input === document.activeElement) return;
        wrap.classList.remove('expanded');
      });
      wrap.addEventListener('click', function(e) {
        if (e.target === input) return;
        e.preventDefault();
        if (wrap.classList.contains('expanded')) return;
        expand();
      });
      input.addEventListener('input', function() {
        storeSearchQuery = (input.value || '').trim();
        try { if (typeof updateStoreDisplay === 'function') updateStoreDisplay(); } catch (err) {}
      });
      input.addEventListener('blur', function() {
        setTimeout(function() {
          if (document.activeElement !== input && !wrap.contains(document.activeElement)) wrap.classList.remove('expanded');
        }, 150);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          wrap.classList.remove('expanded');
          input.value = '';
          storeSearchQuery = '';
          try { if (typeof updateStoreDisplay === 'function') updateStoreDisplay(); } catch (err) {}
          input.blur();
        }
      });
    }
    function initStoreDebug() {
      const btn = document.getElementById('store-debug-btn');
      if (!btn) return;
      btn.addEventListener('click', () => {
        storeDebugMode = !storeDebugMode;
        btn.classList.toggle('active', storeDebugMode);
        btn.textContent = storeDebugMode ? 'Debug ON' : 'Debug';
        const panel = document.getElementById('store-panel');
        if (panel) panel.classList.toggle('store-debug-mode', storeDebugMode);
        try { if (typeof updateStoreDisplay === 'function') updateStoreDisplay(); } catch (err) {}
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { initStoreSearch(); initStoreDebug(); });
    } else {
      initStoreSearch();
      initStoreDebug();
    }

    function redrawStoreCharacter() {
      VALID_SLOT_IDS.forEach(slotId => {
        const slotEl = document.getElementById(slotId);
        if (slotEl) slotEl.innerHTML = '';
        (storePreviewItems[slotId] || []).forEach(item => {
          const img = document.createElement('img');
          img.src = item.src;
          img.alt = item.alt;
          img.onerror = () => { img.style.display = 'none'; };
          img.dataset.itemId = item.id;
          img.dataset.slotId = slotId;
          img.style.zIndex = item.zIndex || 2;
          img.style.visibility = item.visible !== false ? 'visible' : 'hidden';
          img.style.transform = 'translate(-50%, -50%) translate(' + (item.x || 0) + 'px, ' + (item.y || 0) + 'px)';
          img.addEventListener('click', (e) => { e.stopPropagation(); selectStoreItem(item.id); });
          hookPixelPerfect(img);
          slotEl.appendChild(img);
        });
      });
      renderStoreBackgrounds();
    }

    (async function init() {
      await loadInventory();
      await loadWishlist();
      await loadStoreItems();
      setActiveCategory('all');
    })();
  </script>
  <script src="/js/toast.js" defer></script>
  <script src="/js/api.js" defer></script>
  <script src="/js/header.js" defer></script>
</body>
</html>
