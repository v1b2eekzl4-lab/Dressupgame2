<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Tool</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            font-family: 'Comfortaa', 'Quicksand', 'Nunito', Verdana, "Trebuchet MS", Tahoma, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 76px;
            background: #1a1a2e;
            color: #eaeaea;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            color: #eee;
        }
        .pixel-drawing-nav {
            margin: 0 0 1rem 0;
            font-size: 13px;
        }
        .pixel-drawing-nav a {
            color: #f9a8d4;
            text-decoration: none;
        }
        .pixel-drawing-nav a:hover {
            text-decoration: underline;
        }
        .main-wrap {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: nowrap;
            justify-content: center;
        }
        .design-tool-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin-bottom: 0;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #2d3748;
            position: fixed;
            top: 76px;
            left: max(20px, calc((100vw - 1100px) / 2 + 20px));
            right: max(20px, calc((100vw - 1100px) / 2 + 20px));
            width: calc(1100px - 40px);
            max-width: calc(100vw - 40px);
            box-sizing: border-box;
            z-index: 20;
        }
        .design-tool-toolbar-spacer {
            height: 52px;
            flex-shrink: 0;
        }
        .left-panel {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 200px;
            position: fixed;
            top: 132px;
            left: max(20px, calc((100vw - 1100px) / 2 + 20px));
            align-self: flex-start;
            z-index: 10;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }
        .design-tool-toolbar .pixel-drawing-theme-wrap {
            margin-bottom: 0;
        }
        .design-tool-toolbar .undo-redo-row {
            padding: 0;
            margin: 0;
            display: flex;
            gap: 6px;
        }
        .design-tool-toolbar .zoom-controls {
            padding: 0;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .design-tool-toolbar .zoom-controls label {
            font-size: 12px;
            font-weight: 600;
            color: #a0aec0;
            margin: 0;
        }
        .design-tool-toolbar .zoom-controls span {
            min-width: 44px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
        }
        .design-tool-toolbar .toolbar-sep {
            width: 1px;
            height: 24px;
            background: #2d3748;
            flex-shrink: 0;
        }
        body.pixel-drawing-light .design-tool-toolbar .toolbar-sep { background: #d1d5db; }
        body.pixel-drawing-light .design-tool-toolbar .zoom-controls label { color: #4b5563; }
        body.pixel-drawing-light .design-tool-toolbar .zoom-controls span { color: #1f2937; }
        .toolbar {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            padding: 12px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .toolbar label {
            font-size: 12px;
            font-weight: 600;
            color: #a0aec0;
        }
        .toolbar input[type="color"] {
            width: 36px;
            height: 36px;
            padding: 2px;
            border: 2px solid #4a5568;
            border-radius: 6px;
            cursor: pointer;
            background: #2d3748;
        }
        .toolbar input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
        .toolbar input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
        .color-select-wrap .current-color-row { display: flex; align-items: center; gap: 6px; }
        .current-color-swatch {
            width: 28px;
            height: 28px;
            border: 2px solid #4a5568;
            border-radius: 6px;
            padding: 0;
            cursor: pointer;
            background: #2d3748;
        }
        .current-color-swatch:hover { border-color: #e2e8f0; }
        .toolbar .tool-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .brush-size-row {
            align-items: center;
        }
        .brush-size-label {
            margin: 0;
            min-width: 32px;
        }
        .brush-size-input {
            width: 48px;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid #4a5568;
            border-radius: 4px;
            background: #2d3748;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .brush-size-input:focus {
            outline: none;
            border-color: #3182ce;
        }
        .toolbar button:not(.zoom-controls button) {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #4a5568;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .toolbar button:not(.zoom-controls button):hover {
            background: #5a6578;
        }
        .toolbar button.primary {
            background: #3182ce;
        }
        .toolbar button.primary:hover {
            background: #2b6cb0;
        }
        .toolbar .tool-btn { flex: 1; min-width: 0; }
        .toolbar .tool-btn.active {
            background: #3182ce;
            color: #fff;
        }
        .toolbar .tool-btn.active:hover {
            background: #2b6cb0;
        }
        .right-panel {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 180px;
            position: fixed;
            top: 132px;
            right: max(20px, calc((100vw - 1100px) / 2 + 20px));
            align-self: flex-start;
            z-index: 10;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }
        .canvas-wrap {
            margin-left: 216px;
            margin-right: 196px;
            flex: 1;
            min-width: 0;
        }
        .undo-redo-row {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            justify-content: flex-end;
        }
        .undo-redo-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: #4a5568;
            color: #fff;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .undo-redo-btn:hover {
            background: #5a6578;
        }
        .undo-redo-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .zoom-controls label { font-size: 12px; font-weight: 600; color: #a0aec0; margin-right: 4px; }
        .zoom-controls button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: #4a5568;
            color: #fff;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-controls button:hover {
            background: #5a6578;
        }
        .zoom-controls span {
            min-width: 48px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }
        .layers-panel {
            flex-shrink: 0;
            padding: 12px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .layers-panel h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: #a0aec0;
        }
        .layers-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 320px;
            overflow-y: auto;
        }
        .layer-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            padding: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #e2e8f0;
            background: transparent;
            border: 1px solid transparent;
        }
        .layer-item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: 6px;
        }
        .layer-item:hover .layer-item-row {
            background: #2d3748;
        }
        .layer-item.active .layer-item-row {
            background: #3182ce;
            color: #fff;
            border-color: #2b6cb0;
        }
        .layer-item.active {
            border-color: #2b6cb0;
        }
        .layer-item-row .eye {
            margin-left: auto;
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            line-height: 1;
            opacity: 0.8;
        }
        .layer-item-row .eye:hover {
            opacity: 1;
        }
        .layer-item-row .delete-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
            line-height: 1;
            opacity: 0.7;
            color: inherit;
            flex-shrink: 0;
        }
        .layer-item-row .delete-btn:hover {
            opacity: 1;
            color: #f87171;
        }
        .layer-item-row .layer-name-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .layer-item-row .layer-name-label:hover {
            text-decoration: underline;
        }
        .layer-item .layer-name-input {
            flex: 1;
            min-width: 0;
            width: 100%;
            padding: 2px 4px;
            font-size: 12px;
            border: 1px solid #3182ce;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .layer-item-row .layer-name-input:focus {
            outline: none;
            border-color: #63b3ed;
        }
        .layer-frames-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; font-size: 11px; color: #a0aec0; }
        .layer-frames-wrap span.frame-num { min-width: 28px; text-align: center; }
        .layer-frames-wrap .frame-btn { width: 22px; height: 22px; padding: 0; border: none; border-radius: 4px; background: #4a5568; color: #fff; font-size: 12px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .layer-frames-wrap .frame-btn:hover { background: #5a6578; }
        .layer-frames-wrap .frame-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .layer-item { position: relative; }
        .layer-frames-toggle-btn {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 4px;
            background: #2d3748;
            color: #a0aec0;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .layer-frames-toggle-btn:hover { background: #4a5568; color: #e2e8f0; }
        .layer-item.active .layer-frames-toggle-btn { background: #2b6cb0; color: #fff; }
        .layer-item.active .layer-frames-toggle-btn:hover { background: #3182ce; }
        .layer-frames-toggle-btn.open { background: #3182ce; color: #fff; }
        .layer-frames-toggle-menu {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 6px 8px 8px 8px;
            margin: 0 8px 4px 8px;
            background: #1a2744;
            border: 1px solid #2d3748;
            border-radius: 6px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
        .layer-frames-toggle-menu.open {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
        }
        .layer-frames-toggle-menu .layer-frames-wrap { margin: 0; }
        .layer-frame-bars {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .layer-frame-bar {
            width: 24px;
            height: 20px;
            min-width: 24px;
            border: 1px solid #4a5568;
            border-radius: 4px;
            background: #2d3748;
            color: #a0aec0;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .layer-frame-bar:hover { background: #4a5568; color: #e2e8f0; }
        .layer-frame-bar.active { background: #3182ce; border-color: #2b6cb0; color: #fff; }
        .layer-play-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 4px;
            background: #2d3748;
            color: #a0aec0;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .layer-play-btn:hover { background: #4a5568; color: #e2e8f0; }
        .layer-play-btn.playing { background: #3182ce; color: #fff; }
        .layer-item.active .layer-play-btn.playing { background: #2b6cb0; }
        .layer-item.dragging {
            opacity: 0.5;
        }
        .layer-item.drag-over .layer-item-row {
            border-color: #3182ce;
            background: rgba(49, 130, 206, 0.2);
        }
        .add-layer-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border: 2px dashed #4a5568;
            border-radius: 6px;
            background: transparent;
            color: #a0aec0;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
        }
        .add-layer-btn:hover {
            border-color: #3182ce;
            color: #3182ce;
            background: rgba(49, 130, 206, 0.1);
        }
        .add-layer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #2d3748;
            color: #4a5568;
        }
        .add-layer-btn:disabled:hover {
            border-color: #2d3748;
            color: #4a5568;
            background: transparent;
        }
        .merge-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .merge-btn {
            flex: 1;
            min-width: 0;
            padding: 6px 8px;
            border: 1px solid #4a5568;
            border-radius: 6px;
            background: #2d3748;
            color: #e2e8f0;
            font-size: 11px;
            cursor: pointer;
        }
        .merge-btn:hover {
            background: #4a5568;
        }
        .merge-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .save-export-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .save-export-btn {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #4a5568;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .save-export-btn:hover {
            background: #5a6578;
        }
        .save-export-btn.primary {
            background: #3182ce;
        }
        .save-export-btn.primary:hover {
            background: #2b6cb0;
        }
        .canvas-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 250px;
            height: 350px;
            padding: 16px;
            background: #0f0f1a;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px #2d3748;
        }
        #pixelCanvas {
            display: block;
            cursor: crosshair;
        }
        .palette-section {
            padding: 12px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .palette-section h3 {
            margin: 0 0 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: #a0aec0;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
        }
        .palette-swatch {
            width: 22px;
            height: 22px;
            border: 1px solid #4a5568;
            border-radius: 3px;
            cursor: pointer;
            padding: 0;
            box-sizing: border-box;
        }
        .spectrum-wrap {
            margin-bottom: 10px;
        }
        .spectrum-wrap label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #a0aec0;
            margin-bottom: 6px;
        }
        .spectrum-bar {
            position: relative;
            width: 100%;
            height: 14px;
            border-radius: 6px;
            cursor: pointer;
            background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
            border: 1px solid #2d3748;
            box-sizing: border-box;
        }
        .spectrum-thumb {
            position: absolute;
            top: -2px;
            left: 0;
            width: 6px;
            height: 18px;
            margin-left: -3px;
            border: 2px solid #fff;
            border-radius: 2px;
            background: rgba(0,0,0,0.4);
            pointer-events: none;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .palette-swatch:hover {
            border-color: #e2e8f0;
            transform: scale(1.05);
        }
        .palette-swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px #3182ce;
        }
        .toolbar-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #e2e8f0;
            cursor: pointer;
        }
        .toolbar-toggle input { cursor: pointer; }
        .hwb-calc {
            margin-bottom: 10px;
            padding: 8px 0;
        }
        .hwb-calc h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            font-weight: 600;
            color: #a0aec0;
        }
        .hwb-calc-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .hwb-calc-row label {
            width: 18px;
            font-size: 11px;
            font-weight: 600;
            color: #a0aec0;
        }
        .hwb-calc-row input {
            flex: 1;
            min-width: 0;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid #2d3748;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e2e8f0;
            box-sizing: border-box;
        }
        .hwb-calc-row input:focus {
            outline: none;
            border-color: #3182ce;
        }
        /* Theme toggle (in design toolbar) */
        .pixel-drawing-theme-wrap {
            margin-bottom: 1rem;
            font-size: 13px;
        }
        .pixel-drawing-theme-wrap button {
            padding: 6px 12px;
            margin-right: 6px;
            border: 1px solid #4a5568;
            border-radius: 6px;
            background: #2d3748;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 12px;
        }
        .pixel-drawing-theme-wrap button:hover {
            background: #4a5568;
        }
        .pixel-drawing-theme-wrap button.active {
            background: #3182ce;
            border-color: #2b6cb0;
            color: #fff;
        }
        /* Light theme (overrides when body has .pixel-drawing-light) */
        body.pixel-drawing-light { background: #f0f0f0; color: #1a1a1a; }
        body.pixel-drawing-light h1 { color: #111; }
        body.pixel-drawing-light .pixel-drawing-nav a { color: #e1b7d7; }
        body.pixel-drawing-light .pixel-drawing-nav a:hover { text-decoration: underline; }
        body.pixel-drawing-light .design-tool-toolbar { background: #e5e7eb; border-color: #d1d5db; }
        body.pixel-drawing-light .toolbar { background: #e5e7eb; border-color: #d1d5db; }
        body.pixel-drawing-light .toolbar label { color: #4b5563; }
        body.pixel-drawing-light .toolbar input[type="color"] { border-color: #9ca3af; background: #fff; }
        body.pixel-drawing-light .current-color-swatch { border-color: #9ca3af; background: #fff; }
        body.pixel-drawing-light .current-color-swatch:hover { border-color: #4b5563; }
        body.pixel-drawing-light .toolbar button:not(.zoom-controls button) { background: #d1d5db; color: #1f2937; }
        body.pixel-drawing-light .toolbar button:not(.zoom-controls button):hover { background: #9ca3af; }
        body.pixel-drawing-light .toolbar button.primary { background: #e1b7d7; color: #1f2937; }
        body.pixel-drawing-light .toolbar button.primary:hover { background: #c99fc5; }
        body.pixel-drawing-light .toolbar .tool-btn.active { background: #e1b7d7; color: #1f2937; }
        body.pixel-drawing-light .toolbar .tool-btn.active:hover { background: #c99fc5; }
        body.pixel-drawing-light .undo-redo-btn { background: #d1d5db; color: #1f2937; }
        body.pixel-drawing-light .undo-redo-btn:hover { background: #9ca3af; }
        body.pixel-drawing-light .zoom-controls { background: #e5e7eb; border-color: #d1d5db; }
        body.pixel-drawing-light .zoom-controls label { color: #4b5563; }
        body.pixel-drawing-light .zoom-controls button { background: #d1d5db; color: #1f2937; }
        body.pixel-drawing-light .zoom-controls button:hover { background: #9ca3af; }
        body.pixel-drawing-light .zoom-controls span { color: #1f2937; }
        body.pixel-drawing-light .layers-panel { background: #e5e7eb; border-color: #d1d5db; }
        body.pixel-drawing-light .layers-panel h3 { color: #4b5563; }
        body.pixel-drawing-light .layer-item { color: #1f2937; }
        body.pixel-drawing-light .layer-item:hover .layer-item-row { background: #d1d5db; }

    <script>
        (function () {
            var PIXEL_THEME_KEY = 'pixel-drawing-theme';
            function getPixelTheme() {
                try { return localStorage.getItem(PIXEL_THEME_KEY) || 'dark'; } catch (e) { return 'dark'; }
            }
            function setPixelTheme(theme) {
                var body = document.getElementById('pixel-drawing-body');
                if (!body) return;
                body.classList.remove('pixel-drawing-light');
                if (theme === 'light') body.classList.add('pixel-drawing-light');
                try { localStorage.setItem(PIXEL_THEME_KEY, theme); } catch (e) {}
                var lightBtn = document.getElementById('pixelThemeLight');
                var darkBtn = document.getElementById('pixelThemeDark');
                if (lightBtn) lightBtn.classList.toggle('active', theme === 'light');
                if (darkBtn) darkBtn.classList.toggle('active', theme === 'dark');
            }
            (function initTheme() {
                var theme = getPixelTheme();
                var body = document.getElementById('pixel-drawing-body');
                if (body) {
                    body.classList.remove('pixel-drawing-light');
                    if (theme === 'light') body.classList.add('pixel-drawing-light');
                }
                var lightBtn = document.getElementById('pixelThemeLight');
                var darkBtn = document.getElementById('pixelThemeDark');
                if (lightBtn) {
                    lightBtn.classList.toggle('active', theme === 'light');
                    lightBtn.addEventListener('click', function () { setPixelTheme('light'); if (typeof render === 'function') render(); });
                }
                if (darkBtn) {
                    darkBtn.classList.toggle('active', theme === 'dark');
                    darkBtn.addEventListener('click', function () { setPixelTheme('dark'); if (typeof render === 'function') render(); });
                }
            })();

            const AVATAR_BOX_W = 250;
            const AVATAR_BOX_H = 350;
            const MIN_ZOOM = 1;
            const MAX_ZOOM = 8;
            const ZOOM_STEP = 1;
            let undoBtn = null;

            const canvas = document.getElementById('pixelCanvas');
            const ctx = canvas.getContext('2d');
            const colorPicker = document.getElementById('colorPicker');
            const zoomInBtn = document.getElementById('zoomIn');
            const zoomOutBtn = document.getElementById('zoomOut');
            const zoomLabel = document.getElementById('zoomLabel');
            const clearBtn = document.getElementById('clearBtn');
            const exportBtn = document.getElementById('exportBtn');
            const exportGifBtn = document.getElementById('exportGifBtn');
            const saveSpriteSheetBtn = document.getElementById('saveSpriteSheetBtn');
            const exportToUploadItemsBtn = document.getElementById('exportToUploadItemsBtn');
            const saveBtn = document.getElementById('saveBtn');
            const saveAsBtn = document.getElementById('saveAsBtn');
            const importPngInput = document.getElementById('importPngInput');
            const importPngBtn = document.getElementById('importPngBtn');
            const importGifInput = document.getElementById('importGifInput');
            const importSpriteSheetInput = document.getElementById('importSpriteSheetInput');
            const importSpriteSheetBtn = document.getElementById('importSpriteSheetBtn');
            const importGifBtn = document.getElementById('importGifBtn');
            const toolPencilBtn = document.getElementById('toolPencil');
            const toolEraserBtn = document.getElementById('toolEraser');
            const toolBucketBtn = document.getElementById('toolBucket');
            const toolEyedropperBtn = document.getElementById('toolEyedropper');
            const toolLassoBtn = document.getElementById('toolLasso');
            const toolMarqueeBtn = document.getElementById('toolMarquee');
            const toolMoveBtn = document.getElementById('toolMove');
            const currentColorSwatch = document.getElementById('currentColorSwatch');
            const hideBaseToggle = document.getElementById('hideBaseToggle');
            const brandLabelModeToggle = document.getElementById('brandLabelModeToggle');
            undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');
            const layersListEl = document.getElementById('layersList');
            const addLayerBtn = document.getElementById('addLayerBtn');
            const mergeDownBtn = document.getElementById('mergeDownBtn');
            const mergeAllBtn = document.getElementById('mergeAllBtn');
            const deleteLayerBtn = document.getElementById('deleteLayerBtn');
            const canvasWrap = document.getElementById('canvasWrap');
            const paletteGrid = document.getElementById('paletteGrid');
            const spectrumBar = document.getElementById('spectrumBar');
            const spectrumThumb = document.getElementById('spectrumThumb');
            const hwbHInput = document.getElementById('hwbH');
            const hwbWInput = document.getElementById('hwbW');
            const hwbBInput = document.getElementById('hwbB');

            const PALETTE_COLORS = [
                '#000000', '#808080', '#800000', '#808000', '#008000', '#008080', '#000080', '#800080',
                '#c0c0c0', '#ffffff', '#ff0000', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#ff00ff',
                '#404040', '#ff8080', '#80ff80', '#8080ff', '#ffff80', '#80ffff', '#ff80ff', '#804000',
                '#ffa500', '#ff6347', '#ff1493', '#ffd700', '#adff2f', '#00fa9a', '#1e90ff', '#9370db'
            ];

            let zoom = 1;
            let layers = [];
            let activeLayerIndex = 0;
            let playingLayerId = null;
            let framePlayInterval = null;
            let openFramesMenuLayerId = null;
            let isDrawing = false;
            let nextLayerId = 1;
            let toolMode = 'pencil';
            let brushSize = 1;
            const MAX_HISTORY = 50;
            const MAX_LAYERS = 10;
            const MAX_FRAMES_PER_LAYER = 16;
            let history = [];
            let redoHistory = [];
            let selection = new Set();
            let lassoPath = [];
            let marqueeStart = null;
            let marqueeEnd = null;
            let isMarqueeDrawing = false;
            let isLassoDrawing = false;
            let moveDrag = null;
            let gridW = 250;
            let gridH = 350;
            let currentProjectId = null;
            let projectLoaded = false;
            let brandLabelMode = false;
            const PIXEL_PROJECTS_KEY = 'pixelProjects';
            const PIXEL_DB_NAME = 'PixelDrawingDB';
            const PIXEL_DB_VERSION = 1;
            const BRAND_LABEL_GUIDE_W = 200;
            const BRAND_LABEL_GUIDE_H = 70;
            var savedSpriteSheetDataURLInProject = null;
            var savedSpriteSheetFrameCountInProject = null;

            function getPixelProjectsList() {
                try {
                    var raw = localStorage.getItem(PIXEL_PROJECTS_KEY);
                    return raw ? JSON.parse(raw) : [];
                } catch (e) { return []; }
            }
            function setPixelProjectsList(list) {
                try {
                    localStorage.setItem(PIXEL_PROJECTS_KEY, JSON.stringify(list));
                } catch (e) {}
            }
            function isNameInUse(name, excludeDesignProjectId) {
                var norm = (name || '').trim().toLowerCase();
                if (!norm) return Promise.resolve(true);
                return fetch('/api/names-in-use', { credentials: 'same-origin' })
                    .then(function (r) { return r.ok ? r.json() : { names: [] }; })
                    .then(function (data) {
                        var serverNames = (data.names || []).slice();
                        var list = getPixelProjectsList();
                        var designNames = list.filter(function (p) { return p.id !== excludeDesignProjectId; }).map(function (p) { return (p.name || '').trim().toLowerCase(); });
                        return serverNames.indexOf(norm) !== -1 || designNames.indexOf(norm) !== -1;
                    })
                    .catch(function () { return false; });
            }
            function generateId() {
                return 'px-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            }
            function ensureLayerFrames(layer) {
                if (layer.frames && Array.isArray(layer.frames) && layer.frames.length > 0) {
                    var idx = Math.max(0, Math.min(layer.currentFrameIndex || 0, layer.frames.length - 1));
                    layer.currentFrameIndex = idx;
                    layer.grid = layer.frames[idx];
                    return;
                }
                var g = (layer.grid && Array.isArray(layer.grid)) ? copyGrid(layer.grid) : createEmptyGrid();
                layer.frames = [ g ];
                layer.currentFrameIndex = 0;
                layer.grid = g;
            }
            function getProjectData() {
                var out = {
                    gridW: gridW,
                    gridH: gridH,
                    brandLabelMode: brandLabelMode,
                    layers: layers.map(function (l) {
                        ensureLayerFrames(l);
                        return {
                            name: l.name,
                            visible: l.visible,
                            frames: (l.frames || []).map(function (g) { return copyGrid(g); }),
                            currentFrameIndex: l.currentFrameIndex || 0
                        };
                    })
                };
                if (savedSpriteSheetDataURLInProject) {
                    out.savedSpriteSheetDataURL = savedSpriteSheetDataURLInProject;
                    out.spriteSheetFrameCount = savedSpriteSheetFrameCountInProject;
                    out.spriteSheetFrameWidth = gridW;
                    out.spriteSheetFrameHeight = gridH;
                }
                return out;
            }
            function loadProjectData(data) {
                if (!data || !data.layers || !data.layers.length) return false;
                gridW = Math.max(1, parseInt(data.gridW, 10) || gridW);
                gridH = Math.max(1, parseInt(data.gridH, 10) || gridH);
                brandLabelMode = !!(data.brandLabelMode);
                savedSpriteSheetDataURLInProject = data.savedSpriteSheetDataURL || null;
                savedSpriteSheetFrameCountInProject = data.spriteSheetFrameCount != null ? data.spriteSheetFrameCount : null;
                nextLayerId = 1;
                layers = data.layers.map(function (l, i) {
                    var frames = (l.frames && Array.isArray(l.frames) && l.frames.length > 0)
                        ? l.frames.map(function (rawGrid) {
                            var grid = [];
                            for (var y = 0; y < gridH; y++) {
                                var row = rawGrid[y] && Array.isArray(rawGrid[y]) ? rawGrid[y].slice(0, gridW) : [];
                                while (row.length < gridW) row.push(null);
                                grid.push(row);
                            }
                            return grid;
                        })
                        : null;
                    if (!frames || frames.length === 0) {
                        var single = [];
                        var rawGrid = (l.grid && Array.isArray(l.grid)) ? l.grid : [];
                        for (var y = 0; y < gridH; y++) {
                            var row = rawGrid[y] && Array.isArray(rawGrid[y]) ? rawGrid[y].slice(0, gridW) : [];
                            while (row.length < gridW) row.push(null);
                            single.push(row);
                        }
                        frames = [ single ];
                    }
                    var frameIdx = Math.max(0, Math.min(l.currentFrameIndex || 0, frames.length - 1));
                    return {
                        id: nextLayerId++,
                        name: l.name || ('Layer ' + (i + 1)),
                        visible: l.visible !== false,
                        frames: frames,
                        currentFrameIndex: frameIdx,
                        grid: frames[frameIdx]
                    };
                });
                activeLayerIndex = 0;
                history = [];
                redoHistory = [];
                selection = new Set();
                return true;
            }
            function openPixelDB() {
                return new Promise(function (resolve, reject) {
                    var r = typeof indexedDB !== 'undefined' ? indexedDB.open(PIXEL_DB_NAME, PIXEL_DB_VERSION) : null;
                    if (!r) { reject(new Error('IndexedDB not available')); return; }
                    r.onupgradeneeded = function (e) { e.target.result.createObjectStore('projects', { keyPath: 'id' }); };
                    r.onsuccess = function (e) { resolve(e.target.result); };
                    r.onerror = function () { reject(r.error); };
                });
            }
            function loadProjectFromStorage(id) {
                return openPixelDB().then(function (db) {
                    return new Promise(function (resolve) {
                        var tx = db.transaction('projects', 'readonly');
                        var req = tx.objectStore('projects').get(id);
                        req.onsuccess = function () {
                            var row = req.result;
                            db.close();
                            if (row && row.data && loadProjectData(row.data)) {
                                currentProjectId = id;
                                projectLoaded = true;
                                resolve(true);
                                return;
                            }
                            try {
                                var raw = localStorage.getItem('pixelProject-' + id);
                                var data = raw ? JSON.parse(raw) : null;
                                if (data && loadProjectData(data)) {
                                    currentProjectId = id;
                                    projectLoaded = true;
                                    resolve(true);
                                } else resolve(false);
                            } catch (e) { resolve(false); }
                        };
                        req.onerror = function () { db.close(); resolve(false); };
                    });
                }).catch(function () { return false; });
            }
            function saveProjectToStorage(id, name, data) {
                var list = getPixelProjectsList();
                var entry = list.find(function (p) { return p.id === id; });
                var savedAt = new Date().toISOString();
                if (entry) {
                    entry.name = name || entry.name;
                    entry.savedAt = savedAt;
                } else {
                    list.push({ id: id, name: name || 'Untitled', savedAt: savedAt });
                }
                setPixelProjectsList(list);
                return openPixelDB().then(function (db) {
                    return new Promise(function (resolve) {
                        var tx = db.transaction('projects', 'readwrite');
                        tx.objectStore('projects').put({ id: id, data: data });
                        tx.oncomplete = function () { db.close(); resolve(true); };
                        tx.onerror = function () { db.close(); resolve(false); };
                    });
                }).catch(function () { return false; });
            }

            const baseImage = new Image();
            function finishInit() {
                if (brandLabelModeToggle) brandLabelModeToggle.checked = brandLabelMode;
                resizeCanvas();
                render();
            }
            baseImage.onload = function () {
                var params = new URLSearchParams(window.location.search);
                var projectId = params.get('project');
                if (projectId) {
                    loadProjectFromStorage(projectId).then(function (loaded) {
                        if (loaded) projectLoaded = true;
                        else initLayers();
                        renderLayersList();
                        finishInit();
                    });
                } else {
                    initLayers();
                    renderLayersList();
                    finishInit();
                }
            };
            baseImage.onerror = function () {
                var params = new URLSearchParams(window.location.search);
                var projectId = params.get('project');
                if (projectId) {
                    loadProjectFromStorage(projectId).then(function (loaded) {
                        if (loaded) projectLoaded = true;
                        else initLayers();
                        renderLayersList();
                        finishInit();
                    });
                } else {
                    initLayers();
                    renderLayersList();
                    finishInit();
                }

            function createEmptyGrid() {
                const g = [];
                for (let y = 0; y < gridH; y++) {
                    g[y] = [];
                    for (let x = 0; x < gridW; x++) {
                        g[y][x] = null;
                    }
                }
                return g;
            }

            function initLayers() {
                savedSpriteSheetDataURLInProject = null;
                savedSpriteSheetFrameCountInProject = null;
                var g = createEmptyGrid();
                layers = [{ id: nextLayerId++, name: 'Layer 1', frames: [ g ], currentFrameIndex: 0, grid: g, visible: true }];
                activeLayerIndex = 0;
            }

            function addLayer() {
                if (layers.length >= MAX_LAYERS) return;
                var g = createEmptyGrid();
                layers.push({ id: nextLayerId++, name: 'Layer ' + (layers.length + 1), frames: [ g ], currentFrameIndex: 0, grid: g, visible: true });
                activeLayerIndex = layers.length - 1;
                renderLayersList();
                render();
            }

            function setLayerFrame(layerIdx, frameIdx) {
                var layer = layers[layerIdx];
                if (!layer || !layer.frames || frameIdx < 0 || frameIdx >= layer.frames.length) return;
                layer.currentFrameIndex = frameIdx;
                layer.grid = layer.frames[frameIdx];
                renderLayersList();
                render();
            }

            function addLayerFrame(layerIdx) {
                var layer = layers[layerIdx];
                if (!layer || (layer.frames && layer.frames.length >= MAX_FRAMES_PER_LAYER)) return;
                ensureLayerFrames(layer);
                layer.frames.push(copyGrid(layer.grid));
                layer.currentFrameIndex = layer.frames.length - 1;
                layer.grid = layer.frames[layer.currentFrameIndex];
                renderLayersList();
                render();
            }

            function duplicateLayerFrame(layerIdx) {
                var layer = layers[layerIdx];
                if (!layer || (layer.frames && layer.frames.length >= MAX_FRAMES_PER_LAYER)) return;
                ensureLayerFrames(layer);
                var idx = (layer.currentFrameIndex || 0) + 1;
                layer.frames.splice(idx, 0, copyGrid(layer.grid));
                layer.currentFrameIndex = idx;
                layer.grid = layer.frames[idx];
                renderLayersList();
                render();
            }

            function deleteLayer(idx) {
                if (layers.length <= 1) return;
                layers.splice(idx, 1);
                if (idx === activeLayerIndex) {
                    activeLayerIndex = Math.min(activeLayerIndex, layers.length - 1);
                } else if (idx < activeLayerIndex) {
                    activeLayerIndex--;
                }
                renderLayersList();
                render();
            }

            function moveLayer(fromIdx, toIdx) {
                if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= layers.length || toIdx >= layers.length) return;
                var activeId = layers[activeLayerIndex].id;
                var layer = layers.splice(fromIdx, 1)[0];
                if (fromIdx < toIdx) toIdx--;
                layers.splice(toIdx, 0, layer);
                activeLayerIndex = layers.findIndex(function (l) { return l.id === activeId; });
                renderLayersList();
                render();
            }

            function mergeDown() {
                if (layers.length < 2 || activeLayerIndex < 0 || activeLayerIndex >= layers.length - 1) return;
                saveState();
                var top = layers[activeLayerIndex].grid;
                var bottom = layers[activeLayerIndex + 1].grid;
                var merged = [];
                for (var y = 0; y < gridH; y++) {
                    var row = [];
                    for (var x = 0; x < gridW; x++) {
                        var c = (top[y] && top[y][x]) || (bottom[y] && bottom[y][x]) || null;
                        row.push(c);
                    }
                    merged.push(row);
                }
                var name = layers[activeLayerIndex].name + ' + ' + layers[activeLayerIndex + 1].name;
                layers.splice(activeLayerIndex, 2, {
                    id: nextLayerId++,
                    name: name,
                    frames: [ merged ],
                    currentFrameIndex: 0,
                    grid: merged,
                    visible: true
                });
                activeLayerIndex = Math.min(activeLayerIndex, layers.length - 1);
                renderLayersList();
                render();
            }

            function mergeAll() {
                if (layers.length < 2) return;
                saveState();
                var merged = [];
                for (var y = 0; y < gridH; y++) {
                    var row = [];
                    for (var x = 0; x < gridW; x++) {
                        row.push(null);
                    }
                    merged.push(row);
                }
                for (var i = layers.length - 1; i >= 0; i--) {
                    var layer = layers[i];
                    if (!layer.visible) continue;
                    var g = layer.grid;
                    for (var y = 0; y < gridH && y < g.length; y++) {
                        for (var x = 0; x < gridW && x < (g[y] ? g[y].length : 0); x++) {
                            if (g[y][x]) merged[y][x] = g[y][x];
                        }
                    }
                }
                layers = [{
                    id: nextLayerId++,
                    name: 'Merged',
                    frames: [ merged ],
                    currentFrameIndex: 0,
                    grid: merged,
                    visible: true
                }];
                activeLayerIndex = 0;
                renderLayersList();
                render();
            }

                            renderLayersList();
                            return;
                        }

                        ensureLayerFrames(layer);
                        var n = layer.frames ? layer.frames.length : 1;
                        if (n <= 1) { renderLayersList(); return; }
                        playingLayerId = layer.id;
                        framePlayInterval = setInterval(function () {
                            var li = layers.findIndex(function (l) { return l && l.id === playingLayerId; });
                            if (li === -1) {
                                if (framePlayInterval) { clearInterval(framePlayInterval); framePlayInterval = null; }

                            if (!frames || frames.length <= 1) return;

            function getCanvasBgColor() {
                var body = document.getElementById('pixel-drawing-body');
                return (body && body.classList.contains('pixel-drawing-light')) ? '#e5e7eb' : '#2d3748';
            }

            function getPixelSize() {
                return Math.max(1, Math.min(MAX_ZOOM, Math.round(zoom)));
            }

            function resizeCanvas() {
                const ps = getPixelSize();
                canvas.width = gridW * ps;
                canvas.height = gridH * ps;
                canvas.style.width = canvas.width + 'px';
                canvas.style.height = canvas.height + 'px';
                if (canvasWrap) {
                    canvasWrap.style.width = (gridW * ps) + 'px';
                    canvasWrap.style.height = (gridH * ps) + 'px';
                }
                render();
            }

            function render() {
                const ps = getPixelSize();
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = getCanvasBgColor();
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (showBase && baseImage.complete && baseImage.naturalWidth) {
                    const bx = (gridW - baseImage.naturalWidth) / 2;
                    const by = (gridH - baseImage.naturalHeight) / 2;
                    ctx.drawImage(baseImage, 0, 0, baseImage.naturalWidth, baseImage.naturalHeight, bx * ps, by * ps, baseImage.naturalWidth * ps, baseImage.naturalHeight * ps);
                }
                for (var i = layers.length - 1; i >= 0; i--) {
                    var layer = layers[i];
                    if (!layer.visible) continue;
                    var grid = layer.grid;
                    for (var y = 0; y < gridH; y++) {
                        for (var x = 0; x < gridW; x++) {
                            var color = grid[y] && grid[y][x];
                        if (color) {
                            ctx.fillStyle = color;
                            ctx.fillRect(x * ps, y * ps, ps, ps);
                            }
                        }
                    }
                }
                if (ps > 2) {
                    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i <= gridW; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i * ps, 0);
                        ctx.lineTo(i * ps, gridH * ps);
                        ctx.stroke();
                    }
                    for (let j = 0; j <= gridH; j++) {
                        ctx.beginPath();
                        ctx.moveTo(0, j * ps);
                        ctx.lineTo(gridW * ps, j * ps);
                        ctx.stroke();
                    }
                }
                var drawOffset = moveDrag ? moveDrag.offset : { dx: 0, dy: 0 };
                selection.forEach(function (key) {
                    var parts = key.split(',');
                    var y = parseInt(parts[0], 10);
                    var x = parseInt(parts[1], 10);
                    var nx = x + drawOffset.dx;
                    var ny = y + drawOffset.dy;
                    if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH) {
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.9)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(nx * ps, ny * ps, ps, ps);
                    }
                });
                if (isLassoDrawing && lassoPath.length >= 2) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.9)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.moveTo(lassoPath[0].x * ps + 0.5, lassoPath[0].y * ps + 0.5);
                    for (var i = 1; i < lassoPath.length; i++) {
                        ctx.lineTo(lassoPath[i].x * ps + 0.5, lassoPath[i].y * ps + 0.5);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                if (isMarqueeDrawing && marqueeStart && marqueeEnd) {
                    var mx0 = Math.min(marqueeStart.x, marqueeEnd.x);
                    var my0 = Math.min(marqueeStart.y, marqueeEnd.y);
                    var mx1 = Math.max(marqueeStart.x, marqueeEnd.x);
                    var my1 = Math.max(marqueeStart.y, marqueeEnd.y);
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.9)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([2, 2]);
                    ctx.strokeRect(mx0 * ps + 0.5, my0 * ps + 0.5, (mx1 - mx0 + 1) * ps - 1, (my1 - my0 + 1) * ps - 1);
                    ctx.setLineDash([]);
                }
                if (brandLabelMode) {
                    ctx.strokeStyle = 'rgba(255, 165, 0, 0.9)';
                    ctx.lineWidth = Math.max(1, Math.floor(ps / 2));
                    ctx.setLineDash([4, 4]);
                    ctx.strokeRect(0.5, 0.5, BRAND_LABEL_GUIDE_W * ps, BRAND_LABEL_GUIDE_H * ps);
                    ctx.setLineDash([]);
                }
            }

            function coordToCell(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = gridW / rect.width;
                const scaleY = gridH / rect.height;
                const x = Math.floor((clientX - rect.left) * scaleX);
                const y = Math.floor((clientY - rect.top) * scaleY);
                if (x >= 0 && x < gridW && y >= 0 && y < gridH) return { x, y };
                return null;
            }

            function pointInPolygon(px, py, points) {
                var n = points.length;
                if (n < 3) return false;
                var inside = false;
                for (var i = 0, j = n - 1; i < n; j = i++) {
                    var xi = points[i].x, yi = points[i].y;
                    var xj = points[j].x, yj = points[j].y;
                    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
                }
                return inside;
            }

            function getCellsInRect(x0, y0, x1, y1) {
                var set = new Set();
                var minX = Math.max(0, Math.min(x0, x1));
                var maxX = Math.min(gridW - 1, Math.max(x0, x1));
                var minY = Math.max(0, Math.min(y0, y1));
                var maxY = Math.min(gridH - 1, Math.max(y0, y1));
                for (var y = minY; y <= maxY; y++) {
                    for (var x = minX; x <= maxX; x++) {
                        set.add(y + ',' + x);
                    }
                }
                return set;
            }

            function getCellsInPolygon(points) {
                var set = new Set();
                var minX = gridW, minY = gridH, maxX = 0, maxY = 0;
                points.forEach(function (p) {
                    if (p.x < minX) minX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y > maxY) maxY = p.y;
                });
                minX = Math.max(0, Math.floor(minX));
                minY = Math.max(0, Math.floor(minY));
                maxX = Math.min(gridW - 1, Math.ceil(maxX));
                maxY = Math.min(gridH - 1, Math.ceil(maxY));
                for (var y = minY; y <= maxY; y++) {
                    for (var x = minX; x <= maxX; x++) {
                        if (pointInPolygon(x + 0.5, y + 0.5, points)) set.add(y + ',' + x);
                    }
                }
                return set;
            }

            function getColorAtPixel(gx, gy) {
                try {
                    var ps = getPixelSize();
                    var px = Math.min(canvas.width - 1, Math.max(0, gx * ps + Math.floor(ps / 2)));
                    var py = Math.min(canvas.height - 1, Math.max(0, gy * ps + Math.floor(ps / 2)));
                    var data = ctx.getImageData(px, py, 1, 1).data;
                    var r = data[0];
                    var g = data[1];
                    var b = data[2];
                    var a = data[3];
                    if (a < 1) return null;
                    var hex = '#' + [r, g, b].map(function (c) { return ('0' + c.toString(16)).slice(-2); }).join('');
                    return hex;
                } catch (e) { return null; }
            }

            function updateCurrentColorSwatch() {
                if (currentColorSwatch && colorPicker) {
                    currentColorSwatch.style.backgroundColor = colorPicker.value;
                }
            }

            function hexToRgb(hex) {
                var m = (hex || '').replace(/^#/, '').match(/^([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
                if (!m) return { r: 255, g: 0, b: 0 };
                return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
            }
            function rgbToHex(r, g, b) {
                return '#' + [r, g, b].map(function (c) { return ('0' + Math.round(Math.max(0, Math.min(255, c))).toString(16)).slice(-2); }).join('');
            }
            function rgbToHsv(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                var max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
                var h = 0, s = max === 0 ? 0 : d / max, v = max;
                if (d !== 0) {
                    if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
                    else if (max === g) h = (b - r) / d + 2;
                    else h = (r - g) / d + 4;
                    h /= 6;
                }
                return { h: h * 360, s: s * 100, v: v * 100 };
            }
            function hsvToRgb(h, s, v) {
                h = (h % 360 + 360) % 360 / 360;
                s /= 100; v /= 100;
                var r, g, b, i, f, p, q, t;
                i = Math.floor(h * 6);
                f = h * 6 - i;
                p = v * (1 - s);
                q = v * (1 - f * s);
                t = v * (1 - (1 - f) * s);
                switch (i % 6) {
                    case 0: r = v; g = t; b = p; break;
                    case 1: r = q; g = v; b = p; break;
                    case 2: r = p; g = v; b = t; break;
                    case 3: r = p; g = q; b = v; break;
                    case 4: r = t; g = p; b = v; break;
                    default: r = v; g = p; b = q;
                }

                    btn.style.backgroundColor = hex;
                    btn.title = hex;
                    btn.dataset.color = hex;
                    btn.addEventListener('click', function () {
                        colorPicker.value = hex;
                        paletteGrid.querySelectorAll('.palette-swatch').forEach(function (s) { s.classList.remove('selected'); });
                        btn.classList.add('selected');
                    });
                    paletteGrid.appendChild(btn);
                });
            }

            if (colorPicker) colorPicker.addEventListener('input', function () { renderPalette(); updateSpectrumThumb(); updateHwbInputs(); });

            (function () {
                function onHwbChange() { setColorFromHwb(hwbHInput.value, hwbWInput.value, hwbBInput.value); }
                if (hwbHInput) hwbHInput.addEventListener('input', onHwbChange);
                if (hwbWInput) hwbWInput.addEventListener('input', onHwbChange);
                if (hwbBInput) hwbBInput.addEventListener('input', onHwbChange);
            })();

            (function () {
                var spectrumDragging = false;
                function onSpectrumMove(clientX) {
                    setColorFromHue(spectrumXToHue(clientX));
                    updateSpectrumThumb();
                    updateHwbInputs();
                }
                if (spectrumBar) {
                    spectrumBar.addEventListener('mousedown', function (e) {
                        if (e.button !== 0) return;
                        spectrumDragging = true;
                        onSpectrumMove(e.clientX);
                    });
                }
                document.addEventListener('mousemove', function (e) {
                    if (spectrumDragging) onSpectrumMove(e.clientX);
                });
                document.addEventListener('mouseup', function () { spectrumDragging = false; });
            })();

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    if (isLassoDrawing) {
                        lassoPath = [];
                        isLassoDrawing = false;
                    } else if (isMarqueeDrawing) {
                        marqueeStart = null;
                        marqueeEnd = null;
                        isMarqueeDrawing = false;
                    } else if (moveDrag) {
                        moveDrag = null;
                    } else {
                        selection = new Set();
                    }
                    render();
                }
            });

            showBase = true;
            if (hideBaseToggle) hideBaseToggle.checked = false;

            updateCurrentColorSwatch();
            updateSpectrumThumb();
            updateHwbInputs();
            if (!projectLoaded) {
                initLayers();
            }
            renderLayersList();
            renderPalette();
            setZoom(zoom);
        })();
    </script>
  <script src="/js/header.js"></script>
</body>
</html>
